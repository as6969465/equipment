<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>設備檢修維護管理平台 - 申請帳號</title>
<script>
  // 盡早套用深色模式，避免載入時畫面閃爍
  if (localStorage.getItem("emm_dark_mode") === "1") {
    document.documentElement.classList.add("dark");
  }
</script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { darkMode: "class" };
</script>
<script type="module" src="firebase-init.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-100 to-slate-300 dark:from-slate-900 dark:to-slate-800 text-slate-800 dark:text-slate-100">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 dark:bg-slate-800">
    <div class="text-center mb-8">
      <div class="mx-auto mb-3 w-14 h-14 rounded-full bg-blue-600 flex items-center justify-center text-white text-2xl">🛠</div>
      <h1 class="text-xl font-bold text-slate-800 dark:text-slate-100">申請帳號</h1>
      <p class="text-sm text-slate-500 mt-1 dark:text-slate-400">送出後將由管理員審核，核准後才能登入</p>
    </div>

    <form id="registerForm" class="space-y-4" novalidate>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1 dark:text-slate-300" for="account">帳號</label>
        <input id="account" name="account" type="text" maxlength="15" required
          class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100"
          placeholder="設定登入帳號" autocomplete="username">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1 dark:text-slate-300" for="name">姓名</label>
        <input id="name" name="name" type="text" maxlength="20" required
          class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100"
          placeholder="請輸入姓名">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1 dark:text-slate-300" for="department">負責部門/區域</label>
        <input id="department" name="department" type="text" maxlength="30"
          class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100"
          placeholder="例如：1F 維護組（選填）">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1 dark:text-slate-300" for="password">密碼</label>
        <input id="password" name="password" type="password" minlength="6" maxlength="30" required
          class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100"
          placeholder="至少 6 個字元" autocomplete="new-password">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1 dark:text-slate-300" for="passwordConfirm">確認密碼</label>
        <input id="passwordConfirm" name="passwordConfirm" type="password" minlength="6" maxlength="30" required
          class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100"
          placeholder="請再輸入一次密碼" autocomplete="new-password">
      </div>

      <div id="errorMsg" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2 dark:text-red-300 dark:bg-red-900/40 dark:border-red-800"></div>
      <div id="successMsg" class="hidden text-sm text-green-700 bg-green-50 border border-green-200 rounded-lg px-3 py-2 dark:text-green-300 dark:bg-green-900/40 dark:border-green-800"></div>

      <button id="registerBtn" type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-blue-300 text-white font-medium py-2.5 rounded-lg transition">
        送出申請
      </button>
    </form>

    <p class="text-sm text-center mt-4">
      <a href="index.html" class="text-blue-600 hover:underline dark:text-blue-400">返回登入</a>
    </p>
  </div>

<script src="register.js"></script>
</body>
</html>
