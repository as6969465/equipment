function minutesBetween(start, end) {
  if (!start || !end) return null;
  const diff = (new Date(end) - new Date(start)) / 60000;
  return diff >= 0 ? Math.round(diff) : null;
}

// 將 datetime-local 格式（YYYY-MM-DDTHH:mm）轉為表格易讀的顯示格式
function formatDateTime(value) {
  if (!value) return "-";
  return value.replace("T", " ");
}

// 取得目前時間，格式化為 datetime-local 輸入框可用的本機時間字串
function nowDateTimeLocal() {
  const d = new Date();
  const pad = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function daysUntilDue(lastMaintenance, cycleDays) {
  const last = new Date(lastMaintenance);
  const due = new Date(last.getTime() + cycleDays * 86400000);
  const today = new Date("2026-07-15");
  return Math.round((due - today) / 86400000);
}

// 產生設備專屬 QR 碼所編碼的深層連結：手機掃描後直接開啟該設備的掃描紀錄頁
// 使用 hash 片段（#eq=）而非 query，避免部分靜態託管 clean-URL 重導向時遺失參數
function equipmentScanUrl(equipmentId) {
  return window.location.origin + "/app.html#eq=" + encodeURIComponent(equipmentId);
}

// 從網址 query 或 hash 取出設備編號參數
function readEqParam() {
  const fromQuery = new URLSearchParams(window.location.search).get("eq");
  if (fromQuery) return fromQuery;
  const hash = window.location.hash.replace(/^#/, "");
  return new URLSearchParams(hash).get("eq") || "";
}

// 以 Firestore 集合作為多人共用、即時同步的資料來源
// 集合是空的（第一次啟用）時，會用內建範例資料自動寫入一次，讓所有人共用同一份起始資料
// firebase-init.js 以 type="module" 載入（瀏覽器會延後執行），
// 主程式為一般 script 會先執行，故 window.firebaseReady/window.fb 可能尚未就緒，
// 這裡改為輪詢等待，避免時序競爭。
function waitForFirebaseReady() {
  return new Promise((resolve) => {
    (function check() {
      if (window.firebaseReady && window.fb) {
        window.firebaseReady.then(resolve);
      } else {
        setTimeout(check, 30);
      }
    })();
  });
}

function useFirestoreCollection(name, seedData) {
  const [items, setItems] = useState([]);

  useEffect(() => {
    let unsubscribe = () => {};
    let cancelled = false;
    waitForFirebaseReady().then(() => {
      if (cancelled) return;
      const { db, collection, doc, setDoc, getDocs, onSnapshot } = window.fb;
      const colRef = collection(db, name);
      getDocs(colRef).then((snap) => {
        if (snap.empty) {
          seedData.forEach((item) => setDoc(doc(db, name, String(item.id)), item));
        }
      });
      unsubscribe = onSnapshot(colRef, (snap) => {
        setItems(snap.docs.map((d) => ({ ...d.data(), id: d.id })));
      });
    });
    return () => {
      cancelled = true;
      unsubscribe();
    };
  }, [name]);

  async function addItem(item) {
    await waitForFirebaseReady();
    const { db, collection, doc, setDoc } = window.fb;
    await setDoc(doc(collection(db, name), String(item.id)), item);
  }
  async function updateItem(id, changes) {
    await waitForFirebaseReady();
    const { db, doc, updateDoc } = window.fb;
    await updateDoc(doc(db, name, String(id)), changes);
  }
  async function removeItem(id) {
    await waitForFirebaseReady();
    const { db, doc, deleteDoc } = window.fb;
    await deleteDoc(doc(db, name, String(id)));
  }

  return { items, addItem, updateItem, removeItem };
}

// ===================== QR 碼元件 =====================

function QRCode({ text, size = 96, className = "" }) {
  const dataUrl = useMemo(() => {
    if (typeof window.qrcode !== "function") return "";
    const qr = window.qrcode(0, "M"); // 0 = 自動版本, M = 中度容錯
    qr.addData(text);
    qr.make();
    return qr.createDataURL(6, 8); // cellSize, margin
  }, [text]);

  if (!dataUrl) {
    return <div className="flex items-center justify-center bg-slate-100 text-[10px] text-slate-400 dark:bg-slate-700 dark:text-slate-500" style={{ width: size, height: size }}>QR</div>;
  }
  return <img src={dataUrl} alt={"QR:" + text} width={size} height={size} style={{ imageRendering: "pixelated" }} className={className} />;
}

}

// ===================== 掃描紀錄 =====================

function ScanRecordView({ user, equipment, categories, spareParts, staff, records, onSubmit, onUseParts, initialEquipmentId, onConsumeInitial }) {
  const majors = categories.filter((c) => c.parent === null);
  const [equipmentId, setEquipmentId] = useState("");
  const [majorId, setMajorId] = useState("");
  const [minorId, setMinorId] = useState("");
  const [customMinor, setCustomMinor] = useState("");
  const [note, setNote] = useState("");
  const [startTime, setStartTime] = useState("");
  const [endTime, setEndTime] = useState("");
  const [scanned, setScanned] = useState(false);
  const [errors, setErrors] = useState({});
  const [toast, setToast] = useState("");

  // 更換料件（選填，連動備品庫存）
  const [partsUsed, setPartsUsed] = useState([]);
  const [pickedPartId, setPickedPartId] = useState("");
  const [pickedPartQty, setPickedPartQty] = useState("1");

  // 協同人員（選填）：系統內人員多選 + 外部人員自由輸入
  const [participants, setParticipants] = useState([]);
  const [externalParticipants, setExternalParticipants] = useState("");

  function addPart() {
    if (!pickedPartId) return;
    const qty = Number(pickedPartQty) || 1;
    const part = spareParts.find((p) => p.id === pickedPartId);
    if (!part) return;
    setPartsUsed((list) => {
      const existing = list.find((p) => p.partId === pickedPartId);
      if (existing) {
        return list.map((p) => (p.partId === pickedPartId ? { ...p, qty: p.qty + qty } : p));
      }
      return [...list, { partId: part.id, partName: part.componentName, partRemark: part.remark || "", qty }];
    });
    setPickedPartId("");
    setPickedPartQty("1");
  }

  function removePart(partId) {
    setPartsUsed((list) => list.filter((p) => p.partId !== partId));
  }

  function toggleParticipant(staffId) {
    setParticipants((list) => (list.includes(staffId) ? list.filter((id) => id !== staffId) : [...list, staffId]));
  }

  const minors = categories.filter((c) => c.parent === majorId);
  const selectedEquipment = equipment.find((e) => e.id === equipmentId);
  const isCustomMinor = minors.find((m) => m.id === minorId)?.name === "其他人工手輸";
  const duration = minutesBetween(startTime, endTime);

  function simulateScan(id) {
    setEquipmentId(id);
    setScanned(true);
    setStartTime(nowDateTimeLocal()); // 掃描當下時間自動記錄為開始時間
    setEndTime("");
    setPartsUsed([]);
    setParticipants([]);
    setExternalParticipants("");
  }

  function finishWork() {
    setEndTime(nowDateTimeLocal()); // 點擊「結束作業」按鍵記錄當下時間
  }

  // 由設備專屬 QR 碼深層連結進入時（#eq=設備編號），自動帶入該設備。
  // 設備清單是從 Firestore 非同步載入的，一開始是空陣列，故 equipment 也需列入依賴，
  // 否則清單載入完成前 initialEquipmentId 已判斷過一次就不會再重新檢查。
  useEffect(() => {
    if (initialEquipmentId && equipment.some((e) => e.id === initialEquipmentId)) {
      simulateScan(initialEquipmentId);
      onConsumeInitial && onConsumeInitial();
    }
  }, [initialEquipmentId, equipment]);

  function validate() {
    const e = {};
    if (!equipmentId) e.equipmentId = "請先掃描或選擇設備 QR 碼";
    if (!majorId) e.majorId = "請選擇大分類";
    if (!minorId) e.minorId = "請選擇小分類";
    if (isCustomMinor && !customMinor.trim()) e.customMinor = "請輸入手動項目名稱";
    if (!startTime) e.startTime = "請填寫開始時間";
    if (!endTime) e.endTime = "請填寫結束時間";
    if (startTime && endTime && new Date(endTime) < new Date(startTime)) e.endTime = "結束時間不可早於開始時間";
    setErrors(e);
    return Object.keys(e).length === 0;
  }

  async function handleSubmit(ev) {
    ev.preventDefault();
    if (!validate()) return;

    const externalNames = externalParticipants.split(/[,，、]/).map((s) => s.trim()).filter(Boolean);
    const participantNames = participants.map((id) => staff.find((s) => s.id === id)?.name || id).concat(externalNames);

    try {
      await onSubmit({
        id: "R-" + String(Math.floor(Math.random() * 9000) + 1000),
        equipmentId,
        userId: user.USER_ID,
        userName: user.NAME,
        majorId,
        minorId,
        minorLabel: isCustomMinor ? customMinor.trim() : null, // Firestore 不允許 undefined，用 null 代表無自訂項目
        note,
        startTime,
        endTime,
        createdAt: nowDateTimeLocal(),
        partsUsed,
        participantIds: participants, // 系統內協同人員帳號（供各人員工時統計使用）
        participantNames, // 系統內人員姓名 + 外部人員姓名（僅供顯示）
      });
      if (partsUsed.length > 0) {
        await onUseParts(partsUsed);
      }
    } catch (err) {
      setErrors({ submit: "紀錄儲存失敗，請檢查網路連線後重試。" });
      return;
    }
    setToast("紀錄已成功儲存！");
    setEquipmentId(""); setMajorId(""); setMinorId(""); setCustomMinor("");
    setNote(""); setStartTime(""); setEndTime(""); setScanned(false);
    setPartsUsed([]); setParticipants([]); setExternalParticipants("");
    setTimeout(() => setToast(""), 2500);
  }

  const recent7 = useMemo(() => {
    if (!equipmentId) return [];
    const cutoff = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString().slice(0, 10);
    return (records || [])
      .filter((r) => r.equipmentId === equipmentId && r.createdAt && r.createdAt.slice(0, 10) >= cutoff)
      .sort((a, b) => (b.createdAt || "").localeCompare(a.createdAt || ""));
  }, [equipmentId, records]);

  return (
    <div className="max-w-6xl px-4 sm:px-6 py-4">
      <h2 className="text-lg font-bold text-slate-800 mb-3 dark:text-slate-100">QR 碼掃描紀錄</h2>

      {toast && <div className="mb-3 bg-green-50 border border-green-200 text-green-700 text-sm rounded-lg px-3 py-2 dark:bg-green-900/40 dark:border-green-800 dark:text-green-300">{toast}</div>}

      {!scanned ? (
        <div className="bg-white rounded-xl border border-slate-200 p-4 text-center dark:bg-slate-800 dark:border-slate-700">
          <div className="text-5xl mb-3">📷</div>
          <p className="text-slate-500 text-sm mb-4 dark:text-slate-400">請掃描設備上的 QR 碼（原型模擬：點選以下設備代替掃描）</p>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
            {equipment.map((eq) => (
              <button key={eq.id} onClick={() => simulateScan(eq.id)}
                className="border border-slate-200 rounded-lg px-3 py-2 text-sm hover:border-blue-400 hover:bg-blue-50 text-left dark:border-slate-700 dark:hover:border-blue-500 dark:hover:bg-blue-950/40">
                <div className="font-medium text-slate-700 dark:text-slate-200">{eq.name}</div>
                <div className="text-xs text-slate-400 dark:text-slate-500">{eq.floor} {eq.zone} · {eq.qr}</div>
              </button>
            ))}
          </div>
          {errors.equipmentId && <p className="text-xs text-red-500 mt-2 dark:text-red-400">{errors.equipmentId}</p>}
        </div>
      ) : (
        <div className="flex flex-col lg:flex-row gap-4 items-start">
        <form onSubmit={handleSubmit} className="flex-1 min-w-0 bg-white rounded-xl border border-slate-200 p-4 space-y-3 dark:bg-slate-800 dark:border-slate-700">
          <div className="flex items-center justify-between bg-blue-50 border border-blue-100 rounded-lg px-3 py-2 dark:bg-blue-950/40 dark:border-blue-900">
            <div>
              <div className="font-medium text-slate-800 dark:text-slate-100">{selectedEquipment?.name}</div>
              <div className="text-xs text-slate-500 dark:text-slate-400">{selectedEquipment?.floor} {selectedEquipment?.zone} · {selectedEquipment?.qr}</div>
            </div>
            <button type="button" onClick={() => setScanned(false)} className="text-xs text-blue-600 hover:underline dark:text-blue-400">重新掃描</button>
          </div>

          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="block text-sm font-medium text-slate-700 mb-1 dark:text-slate-200">大分類</label>
              <select value={majorId} onChange={(e) => { setMajorId(e.target.value); setMinorId(""); }}
                className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100">
                <option value="">請選擇</option>
                {majors.map((m) => <option key={m.id} value={m.id}>{m.name}</option>)}
              </select>
              {errors.majorId && <p className="text-xs text-red-500 mt-1 dark:text-red-400">{errors.majorId}</p>}
            </div>
            <div>
              <label className="block text-sm font-medium text-slate-700 mb-1 dark:text-slate-200">小分類</label>
              <select value={minorId} onChange={(e) => setMinorId(e.target.value)} disabled={!majorId}
                className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm bg-white disabled:bg-slate-100 dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100 dark:disabled:bg-slate-800">
                <option value="">請選擇</option>
                {minors.map((m) => <option key={m.id} value={m.id}>{m.name}</option>)}
              </select>
              {errors.minorId && <p className="text-xs text-red-500 mt-1 dark:text-red-400">{errors.minorId}</p>}
            </div>
          </div>

          {isCustomMinor && (
            <div>
              <label className="block text-sm font-medium text-slate-700 mb-1 dark:text-slate-200">手動輸入項目名稱</label>
              <input value={customMinor} onChange={(e) => setCustomMinor(e.target.value)}
                className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100" placeholder="例如：更換濾網" />
              {errors.customMinor && <p className="text-xs text-red-500 mt-1 dark:text-red-400">{errors.customMinor}</p>}
            </div>
          )}

          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="block text-sm font-medium text-slate-700 mb-1 dark:text-slate-200">開始時間（掃描當下自動記錄）</label>
              <input type="datetime-local" value={startTime} onChange={(e) => setStartTime(e.target.value)}
                className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100" />
              {errors.startTime && <p className="text-xs text-red-500 mt-1 dark:text-red-400">{errors.startTime}</p>}
            </div>
            <div>
              <label className="block text-sm font-medium text-slate-700 mb-1 dark:text-slate-200">結束時間</label>
              {endTime ? (
                <input type="datetime-local" value={endTime} onChange={(e) => setEndTime(e.target.value)}
                  className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100" />
              ) : (
                <button type="button" onClick={finishWork}
                  className="w-full bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-medium py-2 rounded-lg">
                  ✅ 結束作業（記錄目前時間）
                </button>
              )}
              {errors.endTime && <p className="text-xs text-red-500 mt-1 dark:text-red-400">{errors.endTime}</p>}
            </div>
          </div>
          {duration !== null && (
            <p className="text-xs text-slate-500 dark:text-slate-400">
              系統自動計算耗時：<span className="font-medium text-blue-600 dark:text-blue-400">{duration} 分鐘</span>
              <button type="button" onClick={finishWork} className="ml-2 text-slate-400 hover:text-blue-600 hover:underline dark:text-slate-500">重新記錄結束時間</button>
            </p>
          )}

          <div>
            <label className="block text-sm font-medium text-slate-700 mb-1 dark:text-slate-200">更換料件（選填）</label>
            <div className="flex gap-2">
              <select value={pickedPartId} onChange={(e) => setPickedPartId(e.target.value)}
                className="flex-1 border border-slate-300 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100">
                <option value="">選擇備品</option>
                {spareParts.map((p) => <option key={p.id} value={p.id}>{p.componentName}{p.remark ? `（${p.remark}）` : ""}（庫存 {p.stock}）</option>)}
              </select>
              <input type="number" min="1" value={pickedPartQty} onChange={(e) => setPickedPartQty(e.target.value)}
                className="w-20 border border-slate-300 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100" placeholder="數量" />
              <button type="button" onClick={addPart} className="bg-slate-700 hover:bg-slate-800 text-white text-sm px-4 rounded-lg">加入</button>
            </div>
            {partsUsed.length > 0 && (
              <ul className="mt-2 space-y-1">
                {partsUsed.map((p) => (
                  <li key={p.partId} className="flex items-center justify-between text-sm bg-slate-50 dark:bg-slate-700 rounded-lg px-3 py-1.5">
                    <span className="text-slate-700 dark:text-slate-200">{p.partName}{p.partRemark ? `（${p.partRemark}）` : ""} × {p.qty}</span>
                    <button type="button" onClick={() => removePart(p.partId)} className="text-slate-400 hover:text-red-500 dark:text-slate-500">移除</button>
                  </li>
                ))}
              </ul>
            )}
          </div>

          <div>
            <label className="block text-sm font-medium text-slate-700 mb-1 dark:text-slate-200">協同人員（選填）</label>
            <div className="flex flex-wrap gap-3 mb-2">
              {staff.filter((s) => s.id !== user.USER_ID && s.status === "active").map((s) => (
                <label key={s.id} className="flex items-center gap-1.5 text-sm text-slate-700 dark:text-slate-200">
                  <input type="checkbox" checked={participants.includes(s.id)} onChange={() => toggleParticipant(s.id)} />
                  {s.name}
                </label>
              ))}
              {staff.filter((s) => s.id !== user.USER_ID && s.status === "active").length === 0 && (
                <span className="text-xs text-slate-400 dark:text-slate-500">目前沒有其他在職人員</span>
              )}
            </div>
            <input value={externalParticipants} onChange={(e) => setExternalParticipants(e.target.value)}
              className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100"
              placeholder="外部/廠商人員姓名，多人以逗號分隔（選填）" />
          </div>

          <div>
            <label className="block text-sm font-medium text-slate-700 mb-1 dark:text-slate-200">備註</label>
            <textarea value={note} onChange={(e) => setNote(e.target.value)} rows="2"
              className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm bg-white dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100" placeholder="其他說明（選填）"></textarea>
          </div>

          {errors.submit && <p className="text-xs text-red-500 dark:text-red-400">{errors.submit}</p>}

          <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg">
            送出紀錄
          </button>
        </form>

        {/* 近七日同設備紀錄 */}
        <div className="w-full lg:w-72 shrink-0 bg-white rounded-xl border border-slate-200 p-4 dark:bg-slate-800 dark:border-slate-700">
          <h3 className="text-sm font-semibold text-slate-700 dark:text-slate-200 mb-3">📋 近七日作業紀錄</h3>
          {recent7.length === 0 ? (
            <p className="text-xs text-slate-400 dark:text-slate-500 text-center py-4">近七日無作業紀錄</p>
          ) : (
            <ul className="space-y-2">
              {recent7.map((r) => {
                const mins = (() => { if (!r.startTime || !r.endTime) return null; const d = (new Date(r.endTime) - new Date(r.startTime)) / 60000; return d > 0 ? Math.round(d) : null; })();
                const dateStr = r.createdAt ? r.createdAt.slice(0, 10) : "";
                const timeStr = r.startTime ? r.startTime.slice(11, 16) : "";
                return (
                  <li key={r.id} className="border border-slate-100 dark:border-slate-700 rounded-lg p-2.5 text-xs space-y-1">
                    <div className="flex items-center justify-between">
                      <span className="font-medium text-slate-700 dark:text-slate-200">{dateStr} {timeStr}</span>
                      {mins !== null && <span className="text-slate-400 dark:text-slate-500">{mins} 分</span>}
                    </div>
                    <div className="text-blue-600 dark:text-blue-400 font-medium">{r.majorLabel}{r.minorLabel ? ` › ${r.minorLabel}` : ""}</div>
                    <div className="text-slate-500 dark:text-slate-400">操作：{r.userName || r.userId}</div>
                    {r.participantNames && r.participantNames.length > 0 && (
                      <div className="text-slate-500 dark:text-slate-400">協同：{r.participantNames.join("、")}</div>
                    )}
                    {(r.partsUsed || []).length > 0 && (
                      <div className="text-slate-500 dark:text-slate-400">料件：{r.partsUsed.map((p) => `${p.partName} x${p.qty}`).join("、")}</div>
                    )}
                    {r.note && <div className="text-slate-400 dark:text-slate-500 truncate" title={r.note}>備註：{r.note}</div>}
                  </li>
                );
              })}
            </ul>
          )}
        </div>
        </div>
      )}
    </div>
  );
}

// ===================== 設備管理 =====================

const EMPTY_EQUIPMENT_FORM = { id: "", name: "", floor: "", zone: "", cycleDays: "" };

function EquipmentView({ equipment, canEdit, onAdd, onUpdate, onDelete }) {
  const [form, setForm] = useState(EMPTY_EQUIPMENT_FORM);
  const [showForm, setShowForm] = useState(false);
  const [editingId, setEditingId] = useState(null); // 正在編輯的設備編號（null = 新增模式）
  const [qrModal, setQrModal] = useState(null);   // 放大檢視單一設備 QR
  const [printTarget, setPrintTarget] = useState(null); // 'all' 或單一設備物件
  const grouped = useMemo(() => {
    const g = {};
    equipment.forEach((eq) => {
      g[eq.floor] = g[eq.floor] || [];
      g[eq.floor].push(eq);
    });
    return g;
  }, [equipment]);

  useEffect(() => {
    if (!printTarget) return;
    const t = setTimeout(() => {
      window.print();
      setPrintTarget(null);
    }, 150);
    return () => clearTimeout(t);
  }, [printTarget]);

  function startAdd() {
    setEditingId(null);
    setForm(EMPTY_EQUIPMENT_FORM);
    setShowForm(true);
  }

  function startEdit(eq) {
    setEditingId(eq.id);
    setForm({ id: eq.id, name: eq.name, floor: eq.floor, zone: eq.zone, cycleDays: eq.cycleDays });
    setShowForm(true);
  }

  function cancelForm() {
    setShowForm(false);
    setEditingId(null);
    setForm(EMPTY_EQUIPMENT_FORM);
  }

  function submit(e) {
    e.preventDefault();
    if (!form.id || !form.name || !form.floor || !form.zone || !form.cycleDays) {
      alert("請完整填寫所有欄位");
      return;
    }
    if (editingId) {
      onUpdate(editingId, { ...form });
    } else {
      onAdd({ ...form, qr: "QR-" + form.id, lastMaintenance: "2026-07-15" });
    }
    cancelForm();
  }

  function handleDelete(eq) {
    if (window.confirm(`確定要刪除設備「${eq.name}」（${eq.id}）嗎？此動作無法復原。`)) {
      onDelete(eq.id);
      if (editingId === eq.id) cancelForm();
    }
  }

  return (
    <div className="px-4 sm:px-6 py-4">
      <div className="flex items-center justify-between mb-3">
        <h2 className="text-lg font-bold text-slate-800 dark:text-slate-100">設備 / QR 碼管理</h2>
        <div className="flex gap-2">
          <button onClick={() => setPrintTarget("all")} className="text-sm bg-slate-700 text-white px-3 py-1.5 rounded-lg hover:bg-slate-800 dark:bg-slate-600">
            🖨 列印全部 QR 標籤
          </button>
          {canEdit && (
            <button onClick={() => (showForm ? cancelForm() : startAdd())} className="text-sm bg-blue-600 text-white px-3 py-1.5 rounded-lg hover:bg-blue-700">
              {showForm ? "取消" : "＋ 新增設備"}
            </button>
          )}
        </div>
      </div>

      {showForm && (
        <form onSubmit={submit} className="bg-white border border-slate-200 rounded-xl p-3 mb-3 grid grid-cols-2 sm:grid-cols-7 gap-2 dark:bg-slate-800 dark:border-slate-700">
          <input placeholder="設備編號 EQ-xxx" value={form.id} onChange={(e) => setForm({ ...form, id: e.target.value })} disabled={!!editingId}
            className="border border-slate-300 rounded px-2 py-1.5 text-sm col-span-1 bg-white disabled:bg-slate-100 disabled:text-slate-400 dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100 dark:disabled:bg-slate-800 dark:disabled:text-slate-500" />
          <input placeholder="設備名稱" value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} className="border border-slate-300 rounded px-2 py-1.5 text-sm col-span-2 bg-white dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100" />
          <input placeholder="樓層，例如 1F" value={form.floor} onChange={(e) => setForm({ ...form, floor: e.target.value })} className="border border-slate-300 rounded px-2 py-1.5 text-sm bg-white dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100" />
          <input placeholder="區域，例如 A區" value={form.zone} onChange={(e) => setForm({ ...form, zone: e.target.value })} className="border border-slate-300 rounded px-2 py-1.5 text-sm bg-white dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100" />
          <input type="number" placeholder="保養週期(天)，例如 30" value={form.cycleDays} onChange={(e) => setForm({ ...form, cycleDays: e.target.value === "" ? "" : Number(e.target.value) })} className="border border-slate-300 rounded px-2 py-1.5 text-sm bg-white dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100" />
          <div className="flex gap-2 col-span-2 sm:col-span-1">
            <button type="submit" className="flex-1 bg-blue-600 text-white rounded px-3 py-1.5 text-sm">{editingId ? "儲存變更" : "儲存"}</button>
            {editingId && <button type="button" onClick={cancelForm} className="flex-1 bg-slate-100 text-slate-600 rounded px-3 py-1.5 text-sm dark:bg-slate-700 dark:text-slate-300">取消</button>}
          </div>
        </form>
      )}

      {Object.keys(grouped).sort().map((floor) => (
        <div key={floor} className="mb-4">
          <h3 className="text-sm font-semibold text-slate-500 mb-2 dark:text-slate-400">{floor}</h3>
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3">
            {grouped[floor].map((eq) => {
              const due = daysUntilDue(eq.lastMaintenance, eq.cycleDays);
              return (
                <div key={eq.id} className="bg-white border border-slate-200 rounded-xl p-4 dark:bg-slate-800 dark:border-slate-700">
                  <div className="flex items-start justify-between gap-2">
                    <div className="min-w-0">
                      <div className="font-medium text-slate-800 truncate dark:text-slate-100">{eq.name}</div>
                      <div className="text-xs text-slate-400 dark:text-slate-500">{eq.id} · {eq.zone}</div>
                    </div>
                    <button onClick={() => setQrModal(eq)} title="點擊放大 / 列印專屬 QR 碼"
                      className="shrink-0 border border-slate-200 rounded p-1 hover:border-blue-400 hover:bg-blue-50 dark:border-slate-700 dark:hover:border-blue-500 dark:hover:bg-blue-950/40">
                      <QRCode text={equipmentScanUrl(eq.id)} size={56} />
                    </button>
                  </div>
                  <div className="mt-2 text-xs text-slate-500 dark:text-slate-400">上次維護：{eq.lastMaintenance}（週期 {eq.cycleDays} 天）</div>
                  <div className="mt-2 flex items-center justify-between">
                    {due < 0 ? <Badge color="red">已逾期 {Math.abs(due)} 天</Badge>
                      : due <= 7 ? <Badge color="amber">{due} 天後到期</Badge>
                      : <Badge color="green">正常</Badge>}
                    <button onClick={() => setQrModal(eq)} className="text-xs text-blue-600 hover:underline dark:text-blue-400">專屬 QR 碼</button>
                  </div>
                  {canEdit && (
                    <div className="mt-3 pt-3 border-t border-slate-100 flex gap-2 dark:border-slate-800">
                      <button onClick={() => startEdit(eq)} className="flex-1 text-xs bg-slate-100 hover:bg-slate-200 text-slate-700 rounded px-2 py-1.5 dark:bg-slate-700 dark:hover:bg-slate-600 dark:text-slate-200">✏ 編輯</button>
                      <button onClick={() => handleDelete(eq)} className="flex-1 text-xs bg-red-50 hover:bg-red-100 text-red-600 rounded px-2 py-1.5 dark:bg-red-950/40 dark:hover:bg-red-900/60 dark:text-red-400">🗑 刪除</button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      ))}

      {/* 單一設備 QR 放大檢視 / 列印 */}
      {qrModal && (
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" onClick={() => setQrModal(null)}>
          <div className="bg-white rounded-2xl p-6 w-full max-w-xs text-center dark:bg-slate-800" onClick={(e) => e.stopPropagation()}>
            <QRLabel equipment={qrModal} size={220} />
            <p className="text-xs text-slate-400 mt-1 mb-3 dark:text-slate-500">掃描此 QR 碼即可開啟該設備的維護紀錄</p>
            <div className="flex gap-2">
              <button onClick={() => setPrintTarget(qrModal)} className="flex-1 bg-blue-600 hover:bg-blue-700 text-white text-sm py-2 rounded-lg">🖨 列印此標籤</button>
              <button onClick={() => setQrModal(null)} className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 text-sm py-2 rounded-lg dark:bg-slate-700 dark:hover:bg-slate-600 dark:text-slate-300">關閉</button>
            </div>
          </div>
        </div>
      )}

      {/* 列印專用區域：畫面上隱藏（移出可視範圍），僅列印時顯示 */}
      <div id="print-area">
        <div className="print-title">設備專屬 QR 碼標籤</div>
        {printTarget === "all"
          ? equipment.map((eq) => <QRLabel key={eq.id} equipment={eq} size={180} />)
          : printTarget ? <QRLabel equipment={printTarget} size={220} /> : null}
      </div>
    </div>
  );
}

// ===================== 備品管理 =====================

const EMPTY_SPAREPART_FORM = {
  id: "", itemNo: "", warehouse: "", equipmentType: "", itemName: "", category: "",
  usagePart: "", componentName: "", remark: "", vendor: "", safetyStock: "", stock: "", unitPrice: "",
};

const SPAREPART_FIELDS = [
  { key: "itemNo", label: "項次" },
  { key: "warehouse", label: "倉別" },
  { key: "equipmentType", label: "設備別" },
  { key: "itemName", label: "品項" },
  { key: "category", label: "分類" },
  { key: "usagePart", label: "使用部位" },
  { key: "componentName", label: "零組件名稱" },
  { key: "remark", label: "備註(型號)" },
  { key: "vendor", label: "廠商" },
  { key: "safetyStock", label: "安全庫存量" },
  { key: "stock", label: "庫存" },
  { key: "unitPrice", label: "單價" },
];
const SPAREPART_NUMBER_FIELDS = ["safetyStock", "stock", "unitPrice"];

function SparePartsView({ spareParts, canEdit, onAdd, onUpdate, onDelete }) {
  const [form, setForm] = useState(EMPTY_SPAREPART_FORM);
  const [showForm, setShowForm] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [search, setSearch] = useState("");
  const fileInputRef = useRef(null);

  function startAdd() {
    setEditingId(null);
    setForm(EMPTY_SPAREPART_FORM);
    setShowForm(true);
  }

  function startEdit(p) {
    setEditingId(p.id);
    setForm({ ...EMPTY_SPAREPART_FORM, ...p });
    setShowForm(true);
  }

  function cancelForm() {
    setShowForm(false);
    setEditingId(null);
    setForm(EMPTY_SPAREPART_FORM);
  }

  function submit(e) {
    e.preventDefault();
    if (!form.itemName || !form.componentName) {
      alert("請至少填寫「品項」與「零組件名稱」");
      return;
    }
    const payload = { ...form };
    SPAREPART_NUMBER_FIELDS.forEach((k) => { payload[k] = Number(payload[k]) || 0; });
    if (editingId) {
      onUpdate(editingId, payload);
    } else {
      payload.id = "SP-" + Date.now().toString(36).toUpperCase();
      onAdd(payload);
    }
    cancelForm();
  }

  function handleDelete(p) {
    if (window.confirm(`確定要刪除備品「${p.itemName}」（${p.componentName}）嗎？此動作無法復原。`)) {
      onDelete(p.id);
      if (editingId === p.id) cancelForm();
    }
  }

  const filtered = spareParts.filter((p) => {
    if (!search.trim()) return true;
    const kw = search.trim().toLowerCase();
    return [p.itemName, p.componentName, p.vendor, p.equipmentType, p.category, p.usagePart, p.warehouse]
      .some((v) => (v || "").toLowerCase().includes(kw));
  });

  function exportSpareParts() {
    const rows = spareParts.map((p) => {
      const row = {};
      SPAREPART_FIELDS.forEach((f) => { row[f.label] = p[f.key]; });
      return row;
    });
    const sheet = XLSX.utils.json_to_sheet(rows);
    const workbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook, sheet, "備品清單");
    const now = new Date();
    const pad = (n) => String(n).padStart(2, "0");
    const stamp = `${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}`;
    XLSX.writeFile(workbook, `備品清單_${stamp}.xlsx`);
  }

  function triggerImport() {
    if (fileInputRef.current) fileInputRef.current.click();
  }

  async function handleImportFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type: "array" });
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
      let created = 0;
      let updated = 0;
      for (const row of rows) {
        const payload = { id: "" };
        SPAREPART_FIELDS.forEach((f) => {
          const raw = row[f.label];
          payload[f.key] = SPAREPART_NUMBER_FIELDS.includes(f.key) ? Number(raw) || 0 : (raw != null ? String(raw) : "");
        });
        const existing = spareParts.find((p) => p.itemNo && p.itemNo === payload.itemNo);
        if (existing) {
          await onUpdate(existing.id, payload);
          updated++;
        } else {
          payload.id = "SP-" + Date.now().toString(36).toUpperCase() + "-" + created;
          await onAdd(payload);
          created++;
        }
      }
      alert(`匯入完成：新增 ${created} 筆、更新 ${updated} 筆（依「項次」比對是否為既有備品）`);
    } catch (err) {
      alert("匯入失敗，請確認檔案格式是否正確（" + err.message + "）");
    } finally {
      e.target.value = "";
    }
  }

  return (
    <div className="px-4 sm:px-6 py-4">
      <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
        <h2 className="text-lg font-bold text-slate-800 dark:text-slate-100">備品管理</h2>
        <div className="flex items-center gap-2 flex-wrap">
          <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="快速查詢：品項/零組件/廠商/設備別..."
            className="border border-slate-300 rounded-lg px-3 py-1.5 text-sm w-56 bg-white dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100" />
          <button onClick={exportSpareParts} className="text-sm bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-1.5 rounded-lg">📤 匯出</button>
          {canEdit && (
            <>
              <button onClick={triggerImport} className="text-sm bg-slate-700 hover:bg-slate-800 text-white px-3 py-1.5 rounded-lg">📥 匯入</button>
              <input ref={fileInputRef} type="file" accept=".xlsx,.xls,.csv" className="hidden" onChange={handleImportFile} />
              <button onClick={() => (showForm ? cancelForm() : startAdd())} className="text-sm bg-blue-600 text-white px-3 py-1.5 rounded-lg hover:bg-blue-700">
                {showForm ? "取消" : "＋ 新增備品"}
              </button>
            </>
          )}
        </div>
      </div>

      {showForm && canEdit && (
        <form onSubmit={submit} className="bg-white border border-slate-200 rounded-xl p-3 mb-3 grid grid-cols-2 sm:grid-cols-6 gap-2 dark:bg-slate-800 dark:border-slate-700">
          <input placeholder="項次" value={form.itemNo} onChange={(e) => setForm({ ...form, itemNo: e.target.value })} className="border border-slate-300 rounded px-2 py-1.5 text-sm bg-white dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100" />
          <input placeholder="倉別" value={form.warehouse} onChange={(e) => setForm({ ...form, warehouse: e.target.value })} className="border border-slate-300 rounded px-2 py-1.5 text-sm bg-white dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100" />
          <input placeholder="設備別" value={form.equipmentType} onChange={(e) => setForm({ ...form, equipmentType: e.target.value })} className="border border-slate-300 rounded px-2 py-1.5 text-sm bg-white dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100" />
          <input placeholder="品項" value={form.itemName} onChange={(e) => setForm({ ...form, itemName: e.target.value })} className="border border-slate-300 rounded px-2 py-1.5 text-sm bg-white dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100" />
          <input placeholder="分類" value={form.category} onChange={(e) => setForm({ ...form, category: e.target.value })} className="border border-slate-300 rounded px-2 py-1.5 text-sm bg-white dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100" />
          <input placeholder="使用部位" value={form.usagePart} onChange={(e) => setForm({ ...form, usagePart: e.target.value })} className="border border-slate-300 rounded px-2 py-1.5 text-sm bg-white dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100" />
          <input placeholder="零組件名稱" value={form.componentName} onChange={(e) => setForm({ ...form, componentName: e.target.value })} className="border border-slate-300 rounded px-2 py-1.5 text-sm bg-white dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100" />
          <input placeholder="備註(型號)" value={form.remark} onChange={(e) => setForm({ ...form, remark: e.target.value })} className="border border-slate-300 rounded px-2 py-1.5 text-sm bg-white dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100" />
          <input placeholder="廠商" value={form.vendor} onChange={(e) => setForm({ ...form, vendor: e.target.value })} className="border border-slate-300 rounded px-2 py-1.5 text-sm bg-white dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100" />
          <input type="number" placeholder="安全庫存量" value={form.safetyStock} onChange={(e) => setForm({ ...form, safetyStock: e.target.value })} className="border border-slate-300 rounded px-2 py-1.5 text-sm bg-white dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100" />
          <input type="number" placeholder="庫存" value={form.stock} onChange={(e) => setForm({ ...form, stock: e.target.value })} className="border border-slate-300 rounded px-2 py-1.5 text-sm bg-white dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100" />
          <input type="number" placeholder="單價" value={form.unitPrice} onChange={(e) => setForm({ ...form, unitPrice: e.target.value })} className="border border-slate-300 rounded px-2 py-1.5 text-sm bg-white dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100" />
          <div className="col-span-2 sm:col-span-6 flex gap-2">
            <button type="submit" className="flex-1 sm:flex-none sm:px-8 bg-blue-600 text-white rounded px-3 py-1.5 text-sm">{editingId ? "儲存變更" : "儲存"}</button>
            <button type="button" onClick={cancelForm} className="flex-1 sm:flex-none sm:px-8 bg-slate-100 text-slate-600 rounded px-3 py-1.5 text-sm dark:bg-slate-700 dark:text-slate-300">取消</button>
          </div>
        </form>
      )}

      <div className="bg-white border border-slate-200 rounded-xl overflow-x-auto dark:bg-slate-800 dark:border-slate-700">
        <table className="w-full text-sm">
          <thead className="bg-slate-50 text-slate-500 text-xs dark:bg-slate-900 dark:text-slate-400">
            <tr>
              {SPAREPART_FIELDS.map((f) => <th key={f.key} className="text-left px-3 py-2 whitespace-nowrap">{f.label}</th>)}
              <th className="text-left px-3 py-2">狀態</th>
              {canEdit && <th className="text-left px-3 py-2">操作</th>}
            </tr>
          </thead>
          <tbody>
            {filtered.map((p) => {
              const low = Number(p.stock) < Number(p.safetyStock);
              return (
                <tr key={p.id} className="border-t border-slate-100 dark:border-slate-800">
                  {SPAREPART_FIELDS.map((f) => (
                    <td key={f.key} className={`px-3 py-2 whitespace-nowrap ${SPAREPART_NUMBER_FIELDS.includes(f.key) ? "tabular-nums" : ""} ${f.key === "componentName" ? "font-medium text-slate-800 dark:text-slate-100" : "text-slate-500 dark:text-slate-400"}`}>
                      {p[f.key] || "-"}
                    </td>
                  ))}
                  <td className="px-3 py-2">
                    {low ? <Badge color="red">低於安全庫存</Badge> : <Badge color="green">庫存正常</Badge>}
                  </td>
                  {canEdit && (
                    <td className="px-3 py-2">
                      <div className="flex gap-2">
                        <button onClick={() => startEdit(p)} className="text-xs bg-slate-100 hover:bg-slate-200 text-slate-700 rounded px-2 py-1 dark:bg-slate-700 dark:hover:bg-slate-600 dark:text-slate-200">✏ 編輯</button>
                        <button onClick={() => handleDelete(p)} className="text-xs bg-red-50 hover:bg-red-100 text-red-600 rounded px-2 py-1 dark:bg-red-950/40 dark:hover:bg-red-900/60 dark:text-red-400">🗑 刪除</button>
                      </div>
                    </td>
                  )}
                </tr>
              );
            })}
            {filtered.length === 0 && (
              <tr><td colSpan={SPAREPART_FIELDS.length + 2} className="text-center text-slate-400 py-6 dark:text-slate-500">{search ? "查無符合的備品" : "尚無備品資料"}</td></tr>
            )}
          </tbody>
        </table>
      </div>
    </div>
  );
}

  const [majorName, setMajorName] = useState("");
  const [minorName, setMinorName] = useState("");
  const [targetMajor, setTargetMajor] = useState("");

  return (
    <div className="max-w-5xl px-4 sm:px-6 py-4">
      <h2 className="text-lg font-bold text-slate-800 mb-3 dark:text-slate-100">項目分類設定（大分類 / 小分類）</h2>

      <div className="bg-white border border-slate-200 rounded-xl p-3 mb-3 flex gap-2 dark:bg-slate-800 dark:border-slate-700">

          className="flex-1 border border-slate-300 rounded px-3 py-2 text-sm bg-white dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100" />

          className="bg-blue-600 text-white rounded px-3 py-2 text-sm">新增大分類</button>

          <div className="flex items-center justify-between mb-2">
            <div className="font-medium text-slate-800 dark:text-slate-100">{m.name}</div>
            <button onClick={() => onRemove(m.id)} className="text-xs text-red-500 hover:underline dark:text-red-400">刪除大分類</button>
          </div>
          <div className="flex flex-wrap gap-2 mb-2">
            {categories.filter((c) => c.parent === m.id).map((c) => (
              <span key={c.id} className="bg-slate-100 text-slate-700 text-xs px-2 py-1 rounded-full flex items-center gap-1 dark:bg-slate-700 dark:text-slate-200">

              </span>

            <button onClick={() => { if (targetMajor === m.id && minorName.trim()) { onAdd({ id: m.id + "-" + Date_now(), name: minorName.trim(), parent: m.id }); setMinorName(""); } }}
              className="bg-slate-700 text-white rounded px-2 py-1 text-xs dark:bg-slate-600">新增</button>
          </div>
        </div>
      ))}
    </div>
  );
}
function Date_now() { return Math.floor(performance.now() * 1000); }

const EMPTY_STAFF_FORM = { id: "", name: "", role: "staff", department: "", status: "active", permissions: DEFAULT_STAFF_PERMISSIONS };

function StaffView({ staff, records, onAdd, onUpdate, onDelete }) {
  const [form, setForm] = useState(EMPTY_STAFF_FORM);
  const [showForm, setShowForm] = useState(false);
  const [editingId, setEditingId] = useState(null); // 正在編輯的帳號（null = 新增模式）

  function startAdd() {
    setEditingId(null);
    setForm(EMPTY_STAFF_FORM);
    setShowForm(true);
  }

  function startEdit(s) {
    setEditingId(s.id);
    setForm({ id: s.id, name: s.name, role: s.role, department: s.department, status: s.status, permissions: s.permissions || DEFAULT_STAFF_PERMISSIONS });
    setShowForm(true);
  }

  function cancelForm() {
    setShowForm(false);
    setEditingId(null);
    setForm(EMPTY_STAFF_FORM);
  }

  function togglePermission(key) {
    setForm((f) => ({
      ...f,
      permissions: f.permissions.includes(key) ? f.permissions.filter((k) => k !== key) : [...f.permissions, key],
    }));
  }

  function submit(e) {
    e.preventDefault();
    if (!form.id || !form.name) return;
    if (editingId) {
      onUpdate(editingId, { ...form });
    } else {
      if (staff.some((s) => s.id === form.id)) {
        alert("此帳號已存在，請使用其他帳號。");
        return;
      }
      onAdd({ ...form });
    }
    cancelForm();
  }

  function handleDelete(s) {
    const hasRecords = records.some((r) => r.userId === s.id);
    const message = hasRecords
      ? `「${s.name}」（${s.id}）已有維護紀錄，刪除人員後歷史紀錄仍會保留，但紀錄清單將僅顯示原始帳號。確定要刪除此人員嗎？`
      : `確定要刪除人員「${s.name}」（${s.id}）嗎？此動作無法復原。`;
    if (window.confirm(message)) {
      onDelete(s.id);
      if (editingId === s.id) cancelForm();
    }
  }

  function handleApprove(s) {
    onUpdate(s.id, { status: "active" });
  }

  function handleReject(s) {
    if (window.confirm(`確定要駁回「${s.name}」（${s.id}）的帳號申請嗎？`)) {
      onUpdate(s.id, { status: "rejected" });
    }
  }

  const pendingCount = staff.filter((s) => s.status === "pending").length;

  // 待審核的申請排在最前面，避免管理員漏看
  const sortedStaff = [...staff].sort((a, b) => (a.status === "pending" ? -1 : 0) - (b.status === "pending" ? -1 : 0));

  return (
    <div className="px-4 sm:px-6 py-4">
      <div className="flex items-center justify-between mb-3">
        <h2 className="text-lg font-bold text-slate-800 dark:text-slate-100">
          人員名冊
          {pendingCount > 0 && <span className="ml-2 align-middle"><Badge color="amber">{pendingCount} 筆待審核</Badge></span>}
        </h2>
        <button onClick={() => (showForm ? cancelForm() : startAdd())} className="text-sm bg-blue-600 text-white px-3 py-1.5 rounded-lg hover:bg-blue-700">
          {showForm ? "取消" : "＋ 新增人員"}
        </button>
      </div>

      {showForm && (
        <form onSubmit={submit} className="bg-white border border-slate-200 rounded-xl p-3 mb-3 grid grid-cols-2 sm:grid-cols-6 gap-2 dark:bg-slate-800 dark:border-slate-700">
          <input placeholder="帳號" value={form.id} onChange={(e) => setForm({ ...form, id: e.target.value })} disabled={!!editingId}
            className="border border-slate-300 rounded px-2 py-1.5 text-sm bg-white disabled:bg-slate-100 disabled:text-slate-400 dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100 dark:disabled:bg-slate-800 dark:disabled:text-slate-500" />
          <input placeholder="姓名" value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} className="border border-slate-300 rounded px-2 py-1.5 text-sm bg-white dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100" />
          <select value={form.role} onChange={(e) => setForm({ ...form, role: e.target.value })} className="border border-slate-300 rounded px-2 py-1.5 text-sm bg-white dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100">
            <option value="staff">維護人員</option>
            <option value="admin">管理員</option>
          </select>
          <input placeholder="負責部門/區域" value={form.department} onChange={(e) => setForm({ ...form, department: e.target.value })} className="border border-slate-300 rounded px-2 py-1.5 text-sm bg-white dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100" />
          <select value={form.status} onChange={(e) => setForm({ ...form, status: e.target.value })} className="border border-slate-300 rounded px-2 py-1.5 text-sm bg-white dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100">
            <option value="active">在職</option>
            <option value="inactive">停用</option>
            <option value="pending">待審核</option>
            <option value="rejected">已駁回</option>
          </select>
          <div className="flex gap-2">
            <button type="submit" className="flex-1 bg-blue-600 text-white rounded px-3 py-1.5 text-sm">{editingId ? "儲存變更" : "儲存"}</button>
            {editingId && <button type="button" onClick={cancelForm} className="flex-1 bg-slate-100 text-slate-600 rounded px-3 py-1.5 text-sm dark:bg-slate-700 dark:text-slate-300">取消</button>}
          </div>

          {form.role === "staff" && (
            <div className="col-span-2 sm:col-span-6 border-t border-slate-100 dark:border-slate-700 pt-2 mt-1">
              <div className="text-xs font-medium text-slate-500 dark:text-slate-400 mb-1.5">可查看頁籤（管理員專屬頁籤不受此設定影響）</div>
              <div className="flex flex-wrap gap-3">
                {ALL_TABS.filter((t) => !t.adminOnly).map((t) => (
                  <label key={t.key} className="flex items-center gap-1.5 text-sm text-slate-700 dark:text-slate-200">
                    <input type="checkbox" checked={form.permissions.includes(t.key)} onChange={() => togglePermission(t.key)} />
                    {t.label}
                  </label>
                ))}
              </div>
            </div>
          )}
        </form>
      )}

      <div className="bg-white border border-slate-200 rounded-xl overflow-x-auto dark:bg-slate-800 dark:border-slate-700">
        <table className="w-full text-sm">
          <thead className="bg-slate-50 text-slate-500 text-xs dark:bg-slate-900 dark:text-slate-400">
            <tr>
              <th className="text-left px-3 py-2">帳號</th>
              <th className="text-left px-3 py-2">姓名</th>
              <th className="text-left px-3 py-2">角色</th>
              <th className="text-left px-3 py-2">負責部門/區域</th>
              <th className="text-left px-3 py-2">可查看頁籤</th>
              <th className="text-left px-3 py-2">狀態</th>
              <th className="text-left px-3 py-2">操作</th>
            </tr>
          </thead>
          <tbody>
            {sortedStaff.map((s) => (
              <tr key={s.id} className={`border-t border-slate-100 dark:border-slate-800 ${s.status === "pending" ? "bg-amber-50/60 dark:bg-amber-900/10" : ""}`}>
                <td className="px-3 py-2 text-slate-500 dark:text-slate-400">{s.id}</td>
                <td className="px-3 py-2 font-medium text-slate-800 dark:text-slate-100">
                  {s.name}
                  {s.selfRegistered && <span className="ml-1 text-[10px] text-slate-400 dark:text-slate-500">（自行申請）</span>}
                </td>
                <td className="px-3 py-2">
                  <Badge color={s.role === "admin" ? "amber" : "slate"}>{s.role === "admin" ? "管理員" : "維護人員"}</Badge>
                </td>
                <td className="px-3 py-2 text-slate-500 dark:text-slate-400">{s.department || "-"}</td>
                <td className="px-3 py-2 text-slate-500 dark:text-slate-400">
                  {s.role === "admin"
                    ? <span className="text-xs">（管理員不受限）</span>
                    : ALL_TABS.filter((t) => !t.adminOnly && (s.permissions || DEFAULT_STAFF_PERMISSIONS).includes(t.key)).map((t) => t.label).join("、") || <span className="text-xs">（無）</span>}
                </td>
                <td className="px-3 py-2">
                  {s.status === "active" && <Badge color="green">在職</Badge>}
                  {s.status === "inactive" && <Badge color="red">停用</Badge>}
                  {s.status === "pending" && <Badge color="amber">待審核</Badge>}
                  {s.status === "rejected" && <Badge color="red">已駁回</Badge>}
                </td>
                <td className="px-3 py-2">
                  <div className="flex gap-2 flex-wrap">
                    {s.status === "pending" ? (
                      <>
                        <button onClick={() => handleApprove(s)} className="text-xs bg-green-50 hover:bg-green-100 text-green-700 rounded px-2 py-1 dark:bg-green-900/40 dark:hover:bg-green-900/60 dark:text-green-300">✓ 核准</button>
                        <button onClick={() => handleReject(s)} className="text-xs bg-red-50 hover:bg-red-100 text-red-600 rounded px-2 py-1 dark:bg-red-950/40 dark:hover:bg-red-900/60 dark:text-red-400">✕ 駁回</button>
                      </>
                    ) : null}
                    <button onClick={() => startEdit(s)} className="text-xs bg-slate-100 hover:bg-slate-200 text-slate-700 rounded px-2 py-1 dark:bg-slate-700 dark:hover:bg-slate-600 dark:text-slate-200">✏ 編輯</button>
                    <button onClick={() => handleDelete(s)} className="text-xs bg-red-50 hover:bg-red-100 text-red-600 rounded px-2 py-1 dark:bg-red-950/40 dark:hover:bg-red-900/60 dark:text-red-400">🗑 刪除</button>
                  </div>
                </td>
              </tr>
            ))}
            {staff.length === 0 && (
              <tr><td colSpan="7" className="text-center text-slate-400 py-6 dark:text-slate-500">尚無人員資料</td></tr>
            )}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ===================== 紀錄查詢（後台） =====================

function RecordsView({ user, records, equipment, categories, staff }) {
  const isAdmin = user.ROLE === "admin";
  const [filterEquipment, setFilterEquipment] = useState("");
  const [filterMajor, setFilterMajor] = useState("");
  const [filterUser, setFilterUser] = useState("");
  const [filterStartDate, setFilterStartDate] = useState("");
  const [filterEndDate, setFilterEndDate] = useState("");

  const visibleRecords = records.filter((r) => (isAdmin ? true : r.userId === user.USER_ID));

  // 人員清單僅管理員可見：以人員名冊為主，並補上名冊中已刪除但仍有歷史紀錄的人員
  const staffList = useMemo(() => {
    const map = new Map(staff.map((s) => [s.id, s.name]));
    records.forEach((r) => { if (!map.has(r.userId)) map.set(r.userId, r.userName); });
    return Array.from(map, ([id, name]) => ({ id, name }));
  }, [staff, records]);

  const filtered = visibleRecords.filter((r) =>
    (!filterEquipment || r.equipmentId === filterEquipment) &&
    (!filterMajor || r.majorId === filterMajor) &&
    (!isAdmin || !filterUser || r.userId === filterUser) &&
    (!filterStartDate || (r.startTime && r.startTime.slice(0, 10) >= filterStartDate)) &&
    (!filterEndDate || (r.startTime && r.startTime.slice(0, 10) <= filterEndDate))
  );

  function nameOf(list, id) { return list.find((x) => x.id === id)?.name || id; }
  function minorLabel(r) {
    if (r.minorLabel) return r.minorLabel;
    return nameOf(categories, r.minorId);
  }

  // 匯出目前篩選結果為 Excel 報表（.xlsx）
  function exportReport() {
    const rows = filtered.map((r) => ({
      "紀錄編號": r.id,
      "設備": nameOf(equipment, r.equipmentId),
      "人員": r.userName,
      "協同人員": (r.participantNames || []).join("、"),
      "大分類": nameOf(categories, r.majorId),
      "小分類/項目": minorLabel(r),
      "開始時間": r.startTime ? r.startTime.replace("T", " ") : "",
      "結束時間": r.endTime ? r.endTime.replace("T", " ") : "",
      "耗時(分)": minutesBetween(r.startTime, r.endTime) ?? "",
      "更換料件": (r.partsUsed || []).map((p) => `${p.partName}${p.partRemark ? `（${p.partRemark}）` : ""} x${p.qty}`).join("、"),
      "備註": r.note || "",
    }));
    const sheet = XLSX.utils.json_to_sheet(rows);
    sheet["!cols"] = [
      { wch: 10 }, { wch: 16 }, { wch: 10 }, { wch: 16 }, { wch: 10 }, { wch: 14 },
      { wch: 18 }, { wch: 18 }, { wch: 8 }, { wch: 24 }, { wch: 24 },
    ];
    const workbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook, sheet, "維護紀錄");
    const now = new Date();
    const pad = (n) => String(n).padStart(2, "0");
    const stamp = `${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}`;
    XLSX.writeFile(workbook, `維護紀錄報表_${stamp}.xlsx`);
  }

  return (
    <div className="px-4 sm:px-6 py-4">
      <div className="flex items-center justify-between mb-2 flex-wrap gap-2">
        <h2 className="text-lg font-bold text-slate-800 dark:text-slate-100">維護作業紀錄查詢</h2>
        <div className="flex items-center gap-2">
          {!isAdmin && <Badge color="slate">僅顯示您本人的紀錄</Badge>}
          <button onClick={exportReport} disabled={filtered.length === 0}
            className="text-sm bg-emerald-600 hover:bg-emerald-700 disabled:bg-slate-300 text-white px-3 py-1.5 rounded-lg dark:disabled:bg-slate-600">
            📊 匯出報表
          </button>
        </div>
      </div>

      <div className="flex gap-2 mb-3">
        <select value={filterEquipment} onChange={(e) => setFilterEquipment(e.target.value)} className="border border-slate-300 rounded px-2 py-1.5 text-sm bg-white dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100">
          <option value="">全部設備</option>
          {equipment.map((eq) => <option key={eq.id} value={eq.id}>{eq.name}</option>)}
        </select>
        <select value={filterMajor} onChange={(e) => setFilterMajor(e.target.value)} className="border border-slate-300 rounded px-2 py-1.5 text-sm bg-white dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100">
          <option value="">全部大分類</option>
          {categories.filter((c) => c.parent === null).map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
        {isAdmin && (
          <select value={filterUser} onChange={(e) => setFilterUser(e.target.value)} className="border border-slate-300 rounded px-2 py-1.5 text-sm bg-white dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100">
            <option value="">全部人員</option>
            {staffList.map((s) => <option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
        )}
        <div className="flex items-center gap-1 text-sm text-slate-500 dark:text-slate-400">
          <input type="date" value={filterStartDate} onChange={(e) => setFilterStartDate(e.target.value)}
            className="border border-slate-300 rounded px-2 py-1.5 text-sm bg-white dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100" />
          <span>至</span>
          <input type="date" value={filterEndDate} onChange={(e) => setFilterEndDate(e.target.value)}
            className="border border-slate-300 rounded px-2 py-1.5 text-sm bg-white dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100" />
          {(filterStartDate || filterEndDate) && (
            <button type="button" onClick={() => { setFilterStartDate(""); setFilterEndDate(""); }} className="text-xs text-blue-600 hover:underline dark:text-blue-400">清除日期</button>
          )}
        </div>
      </div>

      <div className="bg-white border border-slate-200 rounded-xl overflow-x-auto dark:bg-slate-800 dark:border-slate-700">
        <table className="w-full text-sm">
          <thead className="bg-slate-50 text-slate-500 text-xs dark:bg-slate-900 dark:text-slate-400">
            <tr>
              <th className="text-left px-3 py-2">紀錄編號</th>
              <th className="text-left px-3 py-2">設備</th>
              <th className="text-left px-3 py-2">人員</th>
              <th className="text-left px-3 py-2">大分類</th>
              <th className="text-left px-3 py-2">小分類/項目</th>
              <th className="text-left px-3 py-2">開始時間</th>
              <th className="text-left px-3 py-2">結束時間</th>
              <th className="text-left px-3 py-2">耗時(分)</th>
              <th className="text-left px-3 py-2">備註</th>
            </tr>
          </thead>
          <tbody>
            {filtered.map((r) => (
              <tr key={r.id} className="border-t border-slate-100 dark:border-slate-800">
                <td className="px-3 py-2 text-slate-500 dark:text-slate-400">{r.id}</td>
                <td className="px-3 py-2">{nameOf(equipment, r.equipmentId)}</td>
                <td className="px-3 py-2">{r.userName}</td>
                <td className="px-3 py-2">{nameOf(categories, r.majorId)}</td>
                <td className="px-3 py-2">{minorLabel(r)}</td>
                <td className="px-3 py-2 tabular-nums whitespace-nowrap">{formatDateTime(r.startTime)}</td>
                <td className="px-3 py-2 tabular-nums whitespace-nowrap">{formatDateTime(r.endTime)}</td>
                <td className="px-3 py-2 tabular-nums">{minutesBetween(r.startTime, r.endTime) ?? "-"}</td>
                <td className="px-3 py-2 text-slate-500 dark:text-slate-400">{r.note || "-"}</td>
              </tr>
            ))}
            {filtered.length === 0 && (
              <tr><td colSpan="9" className="text-center text-slate-400 py-6 dark:text-slate-500">尚無符合條件的紀錄</td></tr>
            )}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ===================== 數據分析 =====================

function AnalyticsView({ user, records, equipment, categories, staff }) {
  const isAdmin = user.ROLE === "admin";
  const [filterUserId, setFilterUserId] = useState("");
  const [filterStartDate, setFilterStartDate] = useState("");
  const [filterEndDate, setFilterEndDate] = useState("");

  // 人員清單：以人員名冊為主，並補上名冊中已刪除但仍有歷史紀錄的人員，供管理員切換檢視
  const staffList = useMemo(() => {
    const m = new Map(staff.map((s) => [s.id, s.name]));
    records.forEach((r) => { if (!m.has(r.userId)) m.set(r.userId, r.userName); });
    return Array.from(m, ([id, name]) => ({ id, name }));
  }, [staff, records]);

  const dateFiltered = useMemo(() => records.filter((r) =>
    (!filterStartDate || (r.startTime && r.startTime.slice(0, 10) >= filterStartDate)) &&
    (!filterEndDate || (r.startTime && r.startTime.slice(0, 10) <= filterEndDate))
  ), [records, filterStartDate, filterEndDate]);

  // 一般人員固定只看自己的數據（含自己被列為協同人員的紀錄）；
  // 管理員可切換「全部」或指定人員（指定人員時，同樣涵蓋該人員被列為協同人員的紀錄）
  function involvesPerson(r, personId) {
    return r.userId === personId || (r.participantIds || []).includes(personId);
  }
  const scopedRecords = useMemo(() => {
    if (!isAdmin) return dateFiltered.filter((r) => involvesPerson(r, user.USER_ID));
    return filterUserId ? dateFiltered.filter((r) => involvesPerson(r, filterUserId)) : dateFiltered;
  }, [dateFiltered, isAdmin, filterUserId, user]);

  const totalRecords = scopedRecords.length;
  const durations = scopedRecords.map((r) => minutesBetween(r.startTime, r.endTime)).filter((d) => d !== null);
  const avgDuration = durations.length ? Math.round(durations.reduce((a, b) => a + b, 0) / durations.length) : 0;

  const overdue = equipment.filter((eq) => daysUntilDue(eq.lastMaintenance, eq.cycleDays) < 0);
  const upcoming = equipment.filter((eq) => { const d = daysUntilDue(eq.lastMaintenance, eq.cycleDays); return d >= 0 && d <= 7; });

  const majors = categories.filter((c) => c.parent === null);
  const countsByMajor = majors.map((m) => ({ name: m.name, count: scopedRecords.filter((r) => r.majorId === m.id).length }));
  const maxCount = Math.max(1, ...countsByMajor.map((c) => c.count));

  const countsByUser = useMemo(() => {
    const m = {};
    scopedRecords.forEach((r) => { m[r.userName] = (m[r.userName] || 0) + 1; });
    return Object.entries(m).map(([name, count]) => ({ name, count }));
  }, [scopedRecords]);
  const maxUserCount = Math.max(1, ...countsByUser.map((c) => c.count));

  // 各人員在各大分類（巡檢/維修/保養...）分別花費的時間：
  // 一筆紀錄若有多位協同人員，每位參與者都會被記入該紀錄的完整耗時（而非平均分攤）；
  // 「全部人員」統計次數維持以紀錄數為準（見上方 countsByUser），不會因多人參與而膨脹。
  const personTimeBreakdown = useMemo(() => {
    const byPerson = new Map(); // personId -> { id, name, perMajor: { majorId: minutes }, total }
    dateFiltered.forEach((r) => {
      const duration = minutesBetween(r.startTime, r.endTime);
      if (duration === null) return;
      const peopleIds = new Set([r.userId, ...(r.participantIds || [])]);
      peopleIds.forEach((pid) => {
        const name = pid === r.userId ? r.userName : (staff.find((s) => s.id === pid)?.name || pid);
        if (!byPerson.has(pid)) byPerson.set(pid, { id: pid, name, perMajor: {}, total: 0 });
        const entry = byPerson.get(pid);
        entry.perMajor[r.majorId] = (entry.perMajor[r.majorId] || 0) + duration;
        entry.total += duration;
      });
    });
    let rows = Array.from(byPerson.values());
    if (!isAdmin) {
      rows = rows.filter((row) => row.id === user.USER_ID);
    } else if (filterUserId) {
      rows = rows.filter((row) => row.id === filterUserId);
    }
    return rows.sort((a, b) => b.total - a.total);
  }, [dateFiltered, staff, isAdmin, user, filterUserId]);

  return (
    <div className="px-4 sm:px-6 py-4">
      <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
        <h2 className="text-lg font-bold text-slate-800 dark:text-slate-100">數據分析儀表板</h2>
        {isAdmin ? (
          <select value={filterUserId} onChange={(e) => setFilterUserId(e.target.value)} className="border border-slate-300 rounded px-2 py-1.5 text-sm bg-white dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100">
            <option value="">全部人員</option>
            {staffList.map((s) => <option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
        ) : (
          <Badge color="slate">僅顯示您本人的數據</Badge>
        )}
      </div>

      <div className="flex items-center gap-1 text-sm text-slate-500 dark:text-slate-400 mb-4">
        <span className="text-xs">日期篩選：</span>
        <input type="date" value={filterStartDate} onChange={(e) => setFilterStartDate(e.target.value)}
          className="border border-slate-300 rounded px-2 py-1.5 text-sm bg-white dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100" />
        <span>至</span>
        <input type="date" value={filterEndDate} onChange={(e) => setFilterEndDate(e.target.value)}
          className="border border-slate-300 rounded px-2 py-1.5 text-sm bg-white dark:bg-slate-700 dark:border-slate-600 dark:text-slate-100" />
        {(filterStartDate || filterEndDate) && (
          <button type="button" onClick={() => { setFilterStartDate(""); setFilterEndDate(""); }} className="text-xs text-blue-600 hover:underline dark:text-blue-400">清除日期</button>
        )}
      </div>

      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-4">
        <StatCard label="總維護紀錄數" value={totalRecords} />
        <StatCard label="平均耗時(分)" value={avgDuration} />
        <StatCard label="逾期未保養設備" value={overdue.length} highlight="red" />
        <StatCard label="即將到期(7天內)" value={upcoming.length} highlight="amber" />
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <div className="bg-white border border-slate-200 rounded-xl p-4 dark:bg-slate-800 dark:border-slate-700">
          <h3 className="text-sm font-semibold text-slate-600 mb-3 dark:text-slate-300">各大分類維護次數</h3>
          {countsByMajor.map((c) => (
            <div key={c.name} className="mb-2">
              <div className="flex justify-between text-xs text-slate-500 mb-0.5 dark:text-slate-400"><span>{c.name}</span><span>{c.count}</span></div>
              <div className="h-2 bg-slate-100 rounded-full overflow-hidden dark:bg-slate-700">
                <div className="h-full bg-blue-500 rounded-full" style={{ width: (c.count / maxCount * 100) + "%" }}></div>
              </div>
            </div>
          ))}
        </div>

        <div className="bg-white border border-slate-200 rounded-xl p-4 dark:bg-slate-800 dark:border-slate-700">
          <h3 className="text-sm font-semibold text-slate-600 mb-3 dark:text-slate-300">人員作業量統計</h3>
          {countsByUser.map((c) => (
            <div key={c.name} className="mb-2">
              <div className="flex justify-between text-xs text-slate-500 mb-0.5 dark:text-slate-400"><span>{c.name}</span><span>{c.count}</span></div>
              <div className="h-2 bg-slate-100 rounded-full overflow-hidden dark:bg-slate-700">
                <div className="h-full bg-emerald-500 rounded-full" style={{ width: (c.count / maxUserCount * 100) + "%" }}></div>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div className="bg-white border border-slate-200 rounded-xl p-4 mt-4 overflow-x-auto dark:bg-slate-800 dark:border-slate-700">
        <h3 className="text-sm font-semibold text-slate-600 mb-3 dark:text-slate-300">各人員分類耗時統計（協同人員同樣列入完整耗時）</h3>
        {personTimeBreakdown.length === 0 ? (
          <p className="text-sm text-slate-400 dark:text-slate-500">目前無符合條件的紀錄</p>
        ) : (
          <table className="w-full text-sm">
            <thead className="text-xs text-slate-500 dark:text-slate-400">
              <tr>
                <th className="text-left px-2 py-1.5">人員</th>
                {majors.map((m) => <th key={m.id} className="text-right px-2 py-1.5">{m.name}(分)</th>)}
                <th className="text-right px-2 py-1.5">總計(分)</th>
              </tr>
            </thead>
            <tbody>
              {personTimeBreakdown.map((row) => (
                <tr key={row.id} className="border-t border-slate-100 dark:border-slate-800">
                  <td className="px-2 py-1.5 font-medium text-slate-800 dark:text-slate-100">{row.name}</td>
                  {majors.map((m) => <td key={m.id} className="text-right px-2 py-1.5 tabular-nums text-slate-600 dark:text-slate-300">{row.perMajor[m.id] || 0}</td>)}
                  <td className="text-right px-2 py-1.5 tabular-nums font-semibold text-slate-800 dark:text-slate-100">{row.total}</td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

      <div className="bg-white border border-slate-200 rounded-xl p-4 mt-4 dark:bg-slate-800 dark:border-slate-700">
        <h3 className="text-sm font-semibold text-slate-600 mb-3 dark:text-slate-300">保養週期預警清單</h3>
        {overdue.concat(upcoming).length === 0 ? (
          <p className="text-sm text-slate-400 dark:text-slate-500">目前無逾期或即將到期設備</p>
        ) : (
          <ul className="space-y-2">
            {overdue.map((eq) => (
              <li key={eq.id} className="flex justify-between text-sm"><span>{eq.name}（{eq.floor} {eq.zone}）</span><Badge color="red">已逾期 {Math.abs(daysUntilDue(eq.lastMaintenance, eq.cycleDays))} 天</Badge></li>
            ))}
            {upcoming.map((eq) => (
              <li key={eq.id} className="flex justify-between text-sm"><span>{eq.name}（{eq.floor} {eq.zone}）</span><Badge color="amber">{daysUntilDue(eq.lastMaintenance, eq.cycleDays)} 天後到期</Badge></li>
            ))}
          </ul>
        )}
      </div>
    </div>
  );
}

function StatCard({ label, value, highlight }) {
  const colorMap = { red: "text-red-600 dark:text-red-400", amber: "text-amber-600 dark:text-amber-400" };
  return (
    <div className="bg-white border border-slate-200 rounded-xl p-4 dark:bg-slate-800 dark:border-slate-700">
      <div className="text-xs text-slate-500 mb-1 dark:text-slate-400">{label}</div>
      <div className={`text-2xl font-bold tabular-nums ${colorMap[highlight] || "text-slate-800 dark:text-slate-100"}`}>{value}</div>
    </div>
  );
}

// ===================== App Root =====================

function App() {
  const [user, setUser] = useState(null);
  // 記住目前頁籤，重新整理頁面時停留在原本的頁籤（僅限本次瀏覽器分頁/工作階段）
  const [tab, setTab] = useState(() => sessionStorage.getItem("emm_active_tab") || "scan");
  const categoriesFs = useFirestoreCollection("categories", INITIAL_CATEGORIES);
  const equipmentFs = useFirestoreCollection("equipment", INITIAL_EQUIPMENT);
  const recordsFs = useFirestoreCollection("records", INITIAL_RECORDS);
  const staffFs = useFirestoreCollection("staff", INITIAL_STAFF);
  const sparePartsFs = useFirestoreCollection("spareParts", INITIAL_SPARE_PARTS);
  const categories = categoriesFs.items;
  const equipment = equipmentFs.items;
  const records = recordsFs.items;
  const staff = staffFs.items;
  const spareParts = sparePartsFs.items;
  // 讀取設備專屬 QR 碼深層連結參數（#eq=設備編號）
  const [scanEquipmentId, setScanEquipmentId] = useState(() => readEqParam());
  const [darkMode, setDarkMode] = useState(() => localStorage.getItem("emm_dark_mode") === "1");

  useEffect(() => {
    document.documentElement.classList.toggle("dark", darkMode);
    localStorage.setItem("emm_dark_mode", darkMode ? "1" : "0");
  }, [darkMode]);

  useEffect(() => {
    const stored = sessionStorage.getItem("emm_user");
    if (!stored) {
      // 掃描 QR 後若尚未登入，先記住目標設備，登入後導回
      const eq = readEqParam();
      if (eq) sessionStorage.setItem("emm_pending_scan", eq);
      window.location.href = "index.html";
      return;
    }
    setUser(JSON.parse(stored));
    // 登入後若有待處理的掃描目標，帶入掃描頁
    const pending = sessionStorage.getItem("emm_pending_scan");
    if (pending) {
      setScanEquipmentId(pending);
      sessionStorage.removeItem("emm_pending_scan");
    }
  }, []);

  const isAdmin = user?.ROLE === "admin";
  // 一般人員可見頁籤由管理員在「人員名冊」設定；找不到對應人員資料
  // （例如透過正式 FME 帳號登入，尚未建立人員名冊資料）時套用預設值
  const myProfile = staff.find((s) => s.id === user?.USER_ID);
  const myPermissions = myProfile?.permissions || DEFAULT_STAFF_PERMISSIONS;
  const tabs = ALL_TABS.filter((t) => (t.adminOnly ? isAdmin : isAdmin || myPermissions.includes(t.key)));

  // 還原的頁籤若不適用於目前身分（例如換成一般人員登入卻停留在管理員專屬頁籤），改回預設頁籤
  useEffect(() => {
    if (user && !tabs.some((t) => t.key === tab)) {
      setTab("scan");
    }
  }, [isAdmin, user]);

  useEffect(() => {
    if (user) sessionStorage.setItem("emm_active_tab", tab);
  }, [tab, user]);

  if (!user) return null;

  function handleLogout() {
    sessionStorage.removeItem("emm_user");
    sessionStorage.removeItem("emm_active_tab");
    window.location.href = "index.html";
  }

  // 掃描紀錄送出後，依「更換料件」清單扣減對應備品庫存（下限為 0）
  async function handleUseParts(partsUsed) {
    for (const used of partsUsed) {
      const part = spareParts.find((p) => p.id === used.partId);
      if (part) {
        await sparePartsFs.updateItem(part.id, { stock: Math.max(0, Number(part.stock) - Number(used.qty)) });
      }
    }
  }

  return (
    <div>
      <TopNav user={user} tabs={tabs} active={tab} onChange={setTab} onLogout={handleLogout} darkMode={darkMode} onToggleDark={() => setDarkMode((d) => !d)} />
      <div className="py-4">
        {tab === "scan" && <ScanRecordView user={user} equipment={equipment} categories={categories} spareParts={spareParts} staff={staff} records={records} onSubmit={recordsFs.addItem} onUseParts={handleUseParts} initialEquipmentId={scanEquipmentId} onConsumeInitial={() => setScanEquipmentId("")} />}
        {tab === "equipment" && <EquipmentView equipment={equipment} canEdit={isAdmin}
          onAdd={equipmentFs.addItem}
          onUpdate={equipmentFs.updateItem}
          onDelete={equipmentFs.removeItem}
        />}
        {tab === "spareParts" && <SparePartsView spareParts={spareParts} canEdit={isAdmin}
          onAdd={sparePartsFs.addItem}
          onUpdate={sparePartsFs.updateItem}
          onDelete={sparePartsFs.removeItem}
        />}
        {tab === "category" && isAdmin && <CategoryConfigView categories={categories} onAdd={categoriesFs.addItem}
          onRemove={(id) => categories.filter((c) => c.id === id || c.parent === id).forEach((c) => categoriesFs.removeItem(c.id))}
        />}
        {tab === "staff" && isAdmin && <StaffView staff={staff} records={records}
          onAdd={staffFs.addItem}
          onUpdate={staffFs.updateItem}
          onDelete={staffFs.removeItem}
        />}
        {tab === "records" && <RecordsView user={user} records={records} equipment={equipment} categories={categories} staff={staff} />}
        {tab === "analytics" && <AnalyticsView user={user} records={records} equipment={equipment} categories={categories} staff={staff} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
