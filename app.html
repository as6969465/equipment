  { id: "EQ-3F-001", name: "消防泵浦", floor: "3F", zone: "A區", qr: "QR-3F-001", cycleDays: 60, lastMaintenance: "2026-05-01" },

const INITIAL_RECORDS = [

  { id: "R-0002", equipmentId: "EQ-2F-002", userId: "demo", userName: "示範人員", majorId: "c2", minorId: "c2-2", note: "馬達異音排除", startTime: "2026-07-12T13:00", endTime: "2026-07-12T14:10", createdAt: "2026-07-12T14:10" },
  { id: "R-0003", equipmentId: "EQ-1F-002", userId: "admin", userName: "示範管理員", majorId: "c3", minorId: "c3-1", note: "例行巡檢正常", startTime: "2026-07-13T08:00", endTime: "2026-07-13T08:15", createdAt: "2026-07-13T08:15" },
];

function minutesBetween(start, end) {
  if (!start || !end) return null;
  const diff = (new Date(end) - new Date(start)) / 60000;
  return diff >= 0 ? Math.round(diff) : null;
}

// 取得目前時間，格式化為 datetime-local 輸入框可用的本機時間字串
function nowDateTimeLocal() {
  const d = new Date();
  const pad = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function daysUntilDue(lastMaintenance, cycleDays) {
  const last = new Date(lastMaintenance);
  const due = new Date(last.getTime() + cycleDays * 86400000);
  const today = new Date("2026-07-15");
  return Math.round((due - today) / 86400000);
}

// 產生設備專屬 QR 碼所編碼的深層連結：手機掃描後直接開啟該設備的掃描紀錄頁
// 使用 hash 片段（#eq=）而非 query，避免部分靜態託管 clean-URL 重導向時遺失參數
function equipmentScanUrl(equipmentId) {
  return window.location.origin + "/app.html#eq=" + encodeURIComponent(equipmentId);
}

// 從網址 query 或 hash 取出設備編號參數
function readEqParam() {
  const fromQuery = new URLSearchParams(window.location.search).get("eq");
  if (fromQuery) return fromQuery;
  const hash = window.location.hash.replace(/^#/, "");
  return new URLSearchParams(hash).get("eq") || "";
}

// ===================== QR 碼元件 =====================

function QRCode({ text, size = 96, className = "" }) {
  const dataUrl = useMemo(() => {
    if (typeof window.qrcode !== "function") return "";
    const qr = window.qrcode(0, "M"); // 0 = 自動版本, M = 中度容錯
    qr.addData(text);
    qr.make();
    return qr.createDataURL(6, 8); // cellSize, margin
  }, [text]);

  if (!dataUrl) {
    return <div className="flex items-center justify-center bg-slate-100 text-[10px] text-slate-400" style={{ width: size, height: size }}>QR</div>;
  }
  return <img src={dataUrl} alt={"QR:" + text} width={size} height={size} style={{ imageRendering: "pixelated" }} className={className} />;
}

// 單一設備的可列印 QR 標籤
function QRLabel({ equipment, size = 180 }) {
  return (
    <div className="qr-label inline-block text-center border border-slate-300 rounded-lg p-3 m-2 bg-white align-top" style={{ width: "220px" }}>
      <div className="font-bold text-slate-800 text-sm">{equipment.name}</div>
      <div className="text-xs text-slate-500 mb-2">{equipment.floor} {equipment.zone} · {equipment.id}</div>
      <div className="flex justify-center"><QRCode text={equipmentScanUrl(equipment.id)} size={size} /></div>
      <div className="text-[10px] text-slate-400 mt-2">{equipment.qr}</div>
    </div>
  );
}

// ===================== 共用元件 =====================

function Badge({ children, color }) {
  const colors = {
    green: "bg-green-100 text-green-700",
    red: "bg-red-100 text-red-700",
    amber: "bg-amber-100 text-amber-700",
    slate: "bg-slate-100 text-slate-600",
  };
  return <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${colors[color] || colors.slate}`}>{children}</span>;
}

// ===================== 掃描紀錄 =====================

function ScanRecordView({ user, equipment, categories, onSubmit, initialEquipmentId, onConsumeInitial }) {
  const majors = categories.filter((c) => c.parent === null);
  const [equipmentId, setEquipmentId] = useState("");
  const [majorId, setMajorId] = useState("");
  const [minorId, setMinorId] = useState("");
  const [customMinor, setCustomMinor] = useState("");
  const [note, setNote] = useState("");
  const [startTime, setStartTime] = useState("");
  const [endTime, setEndTime] = useState("");
  const [scanned, setScanned] = useState(false);
  const [errors, setErrors] = useState({});
  const [toast, setToast] = useState("");

  const minors = categories.filter((c) => c.parent === majorId);
  const selectedEquipment = equipment.find((e) => e.id === equipmentId);
  const isCustomMinor = minors.find((m) => m.id === minorId)?.name === "其他人工手輸";
  const duration = minutesBetween(startTime, endTime);

  function simulateScan(id) {
    setEquipmentId(id);
    setScanned(true);
    setStartTime(nowDateTimeLocal()); // 掃描當下時間自動記錄為開始時間
    setEndTime("");
  }

  function finishWork() {
    setEndTime(nowDateTimeLocal()); // 點擊「結束作業」按鍵記錄當下時間
  }

  // 由設備專屬 QR 碼深層連結進入時（?eq=設備編號），自動帶入該設備
  useEffect(() => {
    if (initialEquipmentId && equipment.some((e) => e.id === initialEquipmentId)) {
      simulateScan(initialEquipmentId);
      onConsumeInitial && onConsumeInitial();
    }
  }, [initialEquipmentId]);

  function validate() {
    const e = {};
    if (!equipmentId) e.equipmentId = "請先掃描或選擇設備 QR 碼";
    if (!majorId) e.majorId = "請選擇大分類";
    if (!minorId) e.minorId = "請選擇小分類";
    if (isCustomMinor && !customMinor.trim()) e.customMinor = "請輸入手動項目名稱";
    if (!startTime) e.startTime = "請填寫開始時間";
    if (!endTime) e.endTime = "請填寫結束時間";
    if (startTime && endTime && new Date(endTime) < new Date(startTime)) e.endTime = "結束時間不可早於開始時間";
    setErrors(e);
    return Object.keys(e).length === 0;
  }

  function handleSubmit(ev) {
    ev.preventDefault();
    if (!validate()) return;
    onSubmit({
      id: "R-" + String(Math.floor(Math.random() * 9000) + 1000),
      equipmentId,
      userId: user.USER_ID,
      userName: user.NAME,
      majorId,
      minorId,
      minorLabel: isCustomMinor ? customMinor.trim() : undefined,
      note,
      startTime,
      endTime,
      createdAt: nowDateTimeLocal(),
    });
    setToast("紀錄已成功儲存！");
    setEquipmentId(""); setMajorId(""); setMinorId(""); setCustomMinor("");
    setNote(""); setStartTime(""); setEndTime(""); setScanned(false);
    setTimeout(() => setToast(""), 2500);
  }

  return (
    <div className="max-w-4xl px-4 sm:px-6 py-4">
      <h2 className="text-lg font-bold text-slate-800 mb-3">QR 碼掃描紀錄</h2>

      {toast && <div className="mb-3 bg-green-50 border border-green-200 text-green-700 text-sm rounded-lg px-3 py-2">{toast}</div>}

      {!scanned ? (
        <div className="bg-white rounded-xl border border-slate-200 p-4 text-center">
          <div className="text-5xl mb-3">📷</div>
          <p className="text-slate-500 text-sm mb-4">請掃描設備上的 QR 碼（原型模擬：點選以下設備代替掃描）</p>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
            {equipment.map((eq) => (
              <button key={eq.id} onClick={() => simulateScan(eq.id)}
                className="border border-slate-200 rounded-lg px-3 py-2 text-sm hover:border-blue-400 hover:bg-blue-50 text-left">
                <div className="font-medium text-slate-700">{eq.name}</div>
                <div className="text-xs text-slate-400">{eq.floor} {eq.zone} · {eq.qr}</div>
              </button>
            ))}
          </div>
          {errors.equipmentId && <p className="text-xs text-red-500 mt-2">{errors.equipmentId}</p>}
        </div>
      ) : (
        <form onSubmit={handleSubmit} className="bg-white rounded-xl border border-slate-200 p-4 space-y-3">
          <div className="flex items-center justify-between bg-blue-50 border border-blue-100 rounded-lg px-3 py-2">
            <div>
              <div className="font-medium text-slate-800">{selectedEquipment?.name}</div>
              <div className="text-xs text-slate-500">{selectedEquipment?.floor} {selectedEquipment?.zone} · {selectedEquipment?.qr}</div>
            </div>
            <button type="button" onClick={() => setScanned(false)} className="text-xs text-blue-600 hover:underline">重新掃描</button>
          </div>

          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="block text-sm font-medium text-slate-700 mb-1">大分類</label>
              <select value={majorId} onChange={(e) => { setMajorId(e.target.value); setMinorId(""); }}
                className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm">
                <option value="">請選擇</option>
                {majors.map((m) => <option key={m.id} value={m.id}>{m.name}</option>)}
              </select>
              {errors.majorId && <p className="text-xs text-red-500 mt-1">{errors.majorId}</p>}
            </div>
            <div>
              <label className="block text-sm font-medium text-slate-700 mb-1">小分類</label>
              <select value={minorId} onChange={(e) => setMinorId(e.target.value)} disabled={!majorId}
                className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm disabled:bg-slate-100">
                <option value="">請選擇</option>
                {minors.map((m) => <option key={m.id} value={m.id}>{m.name}</option>)}
              </select>
              {errors.minorId && <p className="text-xs text-red-500 mt-1">{errors.minorId}</p>}
            </div>
          </div>

          {isCustomMinor && (
            <div>
              <label className="block text-sm font-medium text-slate-700 mb-1">手動輸入項目名稱</label>
              <input value={customMinor} onChange={(e) => setCustomMinor(e.target.value)}
                className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" placeholder="例如：更換濾網" />
              {errors.customMinor && <p className="text-xs text-red-500 mt-1">{errors.customMinor}</p>}
            </div>
          )}

          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="block text-sm font-medium text-slate-700 mb-1">開始時間（掃描當下自動記錄）</label>
              <input type="datetime-local" value={startTime} onChange={(e) => setStartTime(e.target.value)}
                className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" />
              {errors.startTime && <p className="text-xs text-red-500 mt-1">{errors.startTime}</p>}
            </div>
            <div>
              <label className="block text-sm font-medium text-slate-700 mb-1">結束時間</label>
              {endTime ? (
                <input type="datetime-local" value={endTime} onChange={(e) => setEndTime(e.target.value)}
                  className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" />
              ) : (
                <button type="button" onClick={finishWork}
                  className="w-full bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-medium py-2 rounded-lg">
                  ✅ 結束作業（記錄目前時間）
                </button>
              )}
              {errors.endTime && <p className="text-xs text-red-500 mt-1">{errors.endTime}</p>}
            </div>
          </div>
          {duration !== null && (
            <p className="text-xs text-slate-500">
              系統自動計算耗時：<span className="font-medium text-blue-600">{duration} 分鐘</span>
              <button type="button" onClick={finishWork} className="ml-2 text-slate-400 hover:text-blue-600 hover:underline">重新記錄結束時間</button>
            </p>
          )}

          <div>
            <label className="block text-sm font-medium text-slate-700 mb-1">備註</label>
            <textarea value={note} onChange={(e) => setNote(e.target.value)} rows="2"
              className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" placeholder="其他說明（選填）"></textarea>
          </div>

          <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg">
            送出紀錄
          </button>
        </form>
      )}
    </div>
  );
}

// ===================== 設備管理 =====================

const EMPTY_EQUIPMENT_FORM = { id: "", name: "", floor: "1F", zone: "", cycleDays: 30 };

function EquipmentView({ equipment, canEdit, onAdd, onUpdate, onDelete }) {
  const [form, setForm] = useState(EMPTY_EQUIPMENT_FORM);
  const [showForm, setShowForm] = useState(false);
  const [editingId, setEditingId] = useState(null); // 正在編輯的設備編號（null = 新增模式）
  const [qrModal, setQrModal] = useState(null);   // 放大檢視單一設備 QR
  const [printTarget, setPrintTarget] = useState(null); // 'all' 或單一設備物件
  const grouped = useMemo(() => {
    const g = {};
    equipment.forEach((eq) => {
      g[eq.floor] = g[eq.floor] || [];
      g[eq.floor].push(eq);
    });
    return g;
  }, [equipment]);

  useEffect(() => {
    if (!printTarget) return;
    const t = setTimeout(() => {
      window.print();
      setPrintTarget(null);
    }, 150);
    return () => clearTimeout(t);
  }, [printTarget]);

  function startAdd() {
    setEditingId(null);
    setForm(EMPTY_EQUIPMENT_FORM);
    setShowForm(true);
  }

  function startEdit(eq) {
    setEditingId(eq.id);
    setForm({ id: eq.id, name: eq.name, floor: eq.floor, zone: eq.zone, cycleDays: eq.cycleDays });
    setShowForm(true);
  }

  function cancelForm() {
    setShowForm(false);
    setEditingId(null);
    setForm(EMPTY_EQUIPMENT_FORM);
  }

  function submit(e) {
    e.preventDefault();
    if (!form.id || !form.name) return;
    if (editingId) {
      onUpdate(editingId, { ...form });
    } else {
      onAdd({ ...form, qr: "QR-" + form.id, lastMaintenance: "2026-07-15" });
    }
    cancelForm();
  }

  function handleDelete(eq) {
    if (window.confirm(`確定要刪除設備「${eq.name}」（${eq.id}）嗎？此動作無法復原。`)) {
      onDelete(eq.id);
      if (editingId === eq.id) cancelForm();
    }
  }

  return (
    <div className="px-4 sm:px-6 py-4">
      <div className="flex items-center justify-between mb-3">
        <h2 className="text-lg font-bold text-slate-800">設備 / QR 碼管理</h2>
        <div className="flex gap-2">
          <button onClick={() => setPrintTarget("all")} className="text-sm bg-slate-700 text-white px-3 py-1.5 rounded-lg hover:bg-slate-800">
            🖨 列印全部 QR 標籤
          </button>
          {canEdit && (
            <button onClick={() => (showForm ? cancelForm() : startAdd())} className="text-sm bg-blue-600 text-white px-3 py-1.5 rounded-lg hover:bg-blue-700">
              {showForm ? "取消" : "＋ 新增設備"}
            </button>
          )}
        </div>
      </div>

      {showForm && (
        <form onSubmit={submit} className="bg-white border border-slate-200 rounded-xl p-3 mb-3 grid grid-cols-2 sm:grid-cols-5 gap-2">
          <input placeholder="設備編號 EQ-xxx" value={form.id} onChange={(e) => setForm({ ...form, id: e.target.value })} disabled={!!editingId}
            className="border rounded px-2 py-1.5 text-sm col-span-1 disabled:bg-slate-100 disabled:text-slate-400" />
          <input placeholder="設備名稱" value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} className="border rounded px-2 py-1.5 text-sm col-span-2" />
          <input placeholder="樓層 (1F)" value={form.floor} onChange={(e) => setForm({ ...form, floor: e.target.value })} className="border rounded px-2 py-1.5 text-sm" />
          <input placeholder="區域 (A區)" value={form.zone} onChange={(e) => setForm({ ...form, zone: e.target.value })} className="border rounded px-2 py-1.5 text-sm" />
          <input type="number" placeholder="保養週期(天)" value={form.cycleDays} onChange={(e) => setForm({ ...form, cycleDays: Number(e.target.value) })} className="border rounded px-2 py-1.5 text-sm" />
          <div className="flex gap-2 col-span-2 sm:col-span-1">
            <button type="submit" className="flex-1 bg-blue-600 text-white rounded px-3 py-1.5 text-sm">{editingId ? "儲存變更" : "儲存"}</button>
            {editingId && <button type="button" onClick={cancelForm} className="flex-1 bg-slate-100 text-slate-600 rounded px-3 py-1.5 text-sm">取消</button>}
          </div>
        </form>
      )}

      {Object.keys(grouped).sort().map((floor) => (
        <div key={floor} className="mb-4">
          <h3 className="text-sm font-semibold text-slate-500 mb-2">{floor}</h3>
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3">
            {grouped[floor].map((eq) => {
              const due = daysUntilDue(eq.lastMaintenance, eq.cycleDays);
              return (
                <div key={eq.id} className="bg-white border border-slate-200 rounded-xl p-4">
                  <div className="flex items-start justify-between gap-2">
                    <div className="min-w-0">
                      <div className="font-medium text-slate-800 truncate">{eq.name}</div>
                      <div className="text-xs text-slate-400">{eq.id} · {eq.zone}</div>
                    </div>
                    <button onClick={() => setQrModal(eq)} title="點擊放大 / 列印專屬 QR 碼"
                      className="shrink-0 border border-slate-200 rounded p-1 hover:border-blue-400 hover:bg-blue-50">
                      <QRCode text={equipmentScanUrl(eq.id)} size={56} />
                    </button>
                  </div>
                  <div className="mt-2 text-xs text-slate-500">上次維護：{eq.lastMaintenance}（週期 {eq.cycleDays} 天）</div>
                  <div className="mt-2 flex items-center justify-between">
                    {due < 0 ? <Badge color="red">已逾期 {Math.abs(due)} 天</Badge>
                      : due <= 7 ? <Badge color="amber">{due} 天後到期</Badge>
                      : <Badge color="green">正常</Badge>}
                    <button onClick={() => setQrModal(eq)} className="text-xs text-blue-600 hover:underline">專屬 QR 碼</button>
                  </div>
                  {canEdit && (
                    <div className="mt-3 pt-3 border-t border-slate-100 flex gap-2">
                      <button onClick={() => startEdit(eq)} className="flex-1 text-xs bg-slate-100 hover:bg-slate-200 text-slate-700 rounded px-2 py-1.5">✏ 編輯</button>
                      <button onClick={() => handleDelete(eq)} className="flex-1 text-xs bg-red-50 hover:bg-red-100 text-red-600 rounded px-2 py-1.5">🗑 刪除</button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      ))}

      {/* 單一設備 QR 放大檢視 / 列印 */}
      {qrModal && (
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" onClick={() => setQrModal(null)}>
          <div className="bg-white rounded-2xl p-6 w-full max-w-xs text-center" onClick={(e) => e.stopPropagation()}>
            <QRLabel equipment={qrModal} size={220} />
            <p className="text-xs text-slate-400 mt-1 mb-3">掃描此 QR 碼即可開啟該設備的維護紀錄</p>
            <div className="flex gap-2">
              <button onClick={() => setPrintTarget(qrModal)} className="flex-1 bg-blue-600 hover:bg-blue-700 text-white text-sm py-2 rounded-lg">🖨 列印此標籤</button>
              <button onClick={() => setQrModal(null)} className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 text-sm py-2 rounded-lg">關閉</button>
            </div>
          </div>
        </div>
      )}

      {/* 列印專用區域：畫面上隱藏（移出可視範圍），僅列印時顯示 */}
      <div id="print-area">
        <div className="print-title">設備專屬 QR 碼標籤</div>
        {printTarget === "all"
          ? equipment.map((eq) => <QRLabel key={eq.id} equipment={eq} size={180} />)
          : printTarget ? <QRLabel equipment={printTarget} size={220} /> : null}
      </div>
    </div>
  );
}

// ===================== 分類設定 =====================

function CategoryConfigView({ categories, onAdd, onRemove }) {
  const majors = categories.filter((c) => c.parent === null);
  const [majorName, setMajorName] = useState("");
  const [minorName, setMinorName] = useState("");
  const [targetMajor, setTargetMajor] = useState("");

  return (
    <div className="max-w-5xl px-4 sm:px-6 py-4">
      <h2 className="text-lg font-bold text-slate-800 mb-3">項目分類設定（大分類 / 小分類）</h2>

      <div className="bg-white border border-slate-200 rounded-xl p-3 mb-3 flex gap-2">
        <input value={majorName} onChange={(e) => setMajorName(e.target.value)} placeholder="新增大分類，例如：保養"
          className="flex-1 border rounded px-3 py-2 text-sm" />
        <button onClick={() => { if (majorName.trim()) { onAdd({ id: "c" + Date_now(), name: majorName.trim(), parent: null }); setMajorName(""); } }}
          className="bg-blue-600 text-white rounded px-3 py-2 text-sm">新增大分類</button>
      </div>

      {majors.map((m) => (
        <div key={m.id} className="bg-white border border-slate-200 rounded-xl p-4 mb-3">
          <div className="flex items-center justify-between mb-2">
            <div className="font-medium text-slate-800">{m.name}</div>
            <button onClick={() => onRemove(m.id)} className="text-xs text-red-500 hover:underline">刪除大分類</button>
          </div>
          <div className="flex flex-wrap gap-2 mb-2">
            {categories.filter((c) => c.parent === m.id).map((c) => (
              <span key={c.id} className="bg-slate-100 text-slate-700 text-xs px-2 py-1 rounded-full flex items-center gap-1">
                {c.name}
                <button onClick={() => onRemove(c.id)} className="text-slate-400 hover:text-red-500">×</button>
              </span>
            ))}
          </div>
          <div className="flex gap-2">
            <input value={targetMajor === m.id ? minorName : ""} onChange={(e) => { setTargetMajor(m.id); setMinorName(e.target.value); }}
              placeholder="新增小分類" className="flex-1 border rounded px-2 py-1 text-xs" />
            <button onClick={() => { if (targetMajor === m.id && minorName.trim()) { onAdd({ id: m.id + "-" + Date_now(), name: minorName.trim(), parent: m.id }); setMinorName(""); } }}
              className="bg-slate-700 text-white rounded px-2 py-1 text-xs">新增</button>
          </div>
        </div>
      ))}
    </div>
  );
}
function Date_now() { return Math.floor(performance.now() * 1000); }

// ===================== 紀錄查詢（後台） =====================

function RecordsView({ user, records, equipment, categories }) {
  const isAdmin = user.ROLE === "admin";
  const [filterEquipment, setFilterEquipment] = useState("");
  const [filterMajor, setFilterMajor] = useState("");

  const visibleRecords = records.filter((r) => (isAdmin ? true : r.userId === user.USER_ID));
  const filtered = visibleRecords.filter((r) =>
    (!filterEquipment || r.equipmentId === filterEquipment) &&
    (!filterMajor || r.majorId === filterMajor)
  );

  function nameOf(list, id) { return list.find((x) => x.id === id)?.name || id; }
  function minorLabel(r) {
    if (r.minorLabel) return r.minorLabel;
    return nameOf(categories, r.minorId);
  }

  return (
    <div className="px-4 sm:px-6 py-4">
      <div className="flex items-center justify-between mb-2">
        <h2 className="text-lg font-bold text-slate-800">維護作業紀錄查詢</h2>
        {!isAdmin && <Badge color="slate">僅顯示您本人的紀錄</Badge>}
      </div>

      <div className="flex gap-2 mb-3">
        <select value={filterEquipment} onChange={(e) => setFilterEquipment(e.target.value)} className="border rounded px-2 py-1.5 text-sm">
          <option value="">全部設備</option>
          {equipment.map((eq) => <option key={eq.id} value={eq.id}>{eq.name}</option>)}
        </select>
        <select value={filterMajor} onChange={(e) => setFilterMajor(e.target.value)} className="border rounded px-2 py-1.5 text-sm">
          <option value="">全部大分類</option>
          {categories.filter((c) => c.parent === null).map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
      </div>

      <div className="bg-white border border-slate-200 rounded-xl overflow-x-auto">
        <table className="w-full text-sm">
          <thead className="bg-slate-50 text-slate-500 text-xs">
            <tr>
              <th className="text-left px-3 py-2">紀錄編號</th>
              <th className="text-left px-3 py-2">設備</th>
              <th className="text-left px-3 py-2">人員</th>
              <th className="text-left px-3 py-2">大分類</th>
              <th className="text-left px-3 py-2">小分類/項目</th>
              <th className="text-left px-3 py-2">耗時(分)</th>
              <th className="text-left px-3 py-2">備註</th>
            </tr>
          </thead>
          <tbody>
            {filtered.map((r) => (
              <tr key={r.id} className="border-t border-slate-100">
                <td className="px-3 py-2 text-slate-500">{r.id}</td>
                <td className="px-3 py-2">{nameOf(equipment, r.equipmentId)}</td>
                <td className="px-3 py-2">{r.userName}</td>
                <td className="px-3 py-2">{nameOf(categories, r.majorId)}</td>
                <td className="px-3 py-2">{minorLabel(r)}</td>
                <td className="px-3 py-2">{minutesBetween(r.startTime, r.endTime) ?? "-"}</td>
                <td className="px-3 py-2 text-slate-500">{r.note || "-"}</td>
              </tr>
            ))}
            {filtered.length === 0 && (
              <tr><td colSpan="7" className="text-center text-slate-400 py-6">尚無符合條件的紀錄</td></tr>
            )}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ===================== 數據分析 =====================

function AnalyticsView({ records, equipment, categories }) {
  const totalRecords = records.length;
  const durations = records.map((r) => minutesBetween(r.startTime, r.endTime)).filter((d) => d !== null);
  const avgDuration = durations.length ? Math.round(durations.reduce((a, b) => a + b, 0) / durations.length) : 0;

  const overdue = equipment.filter((eq) => daysUntilDue(eq.lastMaintenance, eq.cycleDays) < 0);
  const upcoming = equipment.filter((eq) => { const d = daysUntilDue(eq.lastMaintenance, eq.cycleDays); return d >= 0 && d <= 7; });

  const majors = categories.filter((c) => c.parent === null);
  const countsByMajor = majors.map((m) => ({ name: m.name, count: records.filter((r) => r.majorId === m.id).length }));
  const maxCount = Math.max(1, ...countsByMajor.map((c) => c.count));

  const countsByUser = useMemo(() => {
    const m = {};
    records.forEach((r) => { m[r.userName] = (m[r.userName] || 0) + 1; });
    return Object.entries(m).map(([name, count]) => ({ name, count }));
  }, [records]);
  const maxUserCount = Math.max(1, ...countsByUser.map((c) => c.count));

  return (
    <div className="px-4 sm:px-6 py-4">
      <h2 className="text-lg font-bold text-slate-800 mb-3">數據分析儀表板</h2>

      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-4">
        <StatCard label="總維護紀錄數" value={totalRecords} />
        <StatCard label="平均耗時(分)" value={avgDuration} />
        <StatCard label="逾期未保養設備" value={overdue.length} highlight="red" />
        <StatCard label="即將到期(7天內)" value={upcoming.length} highlight="amber" />
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <div className="bg-white border border-slate-200 rounded-xl p-4">
          <h3 className="text-sm font-semibold text-slate-600 mb-3">各大分類維護次數</h3>
          {countsByMajor.map((c) => (
            <div key={c.name} className="mb-2">
              <div className="flex justify-between text-xs text-slate-500 mb-0.5"><span>{c.name}</span><span>{c.count}</span></div>
              <div className="h-2 bg-slate-100 rounded-full overflow-hidden">
                <div className="h-full bg-blue-500 rounded-full" style={{ width: (c.count / maxCount * 100) + "%" }}></div>
              </div>
            </div>
          ))}
        </div>

        <div className="bg-white border border-slate-200 rounded-xl p-4">
          <h3 className="text-sm font-semibold text-slate-600 mb-3">人員作業量統計</h3>
          {countsByUser.map((c) => (
            <div key={c.name} className="mb-2">
              <div className="flex justify-between text-xs text-slate-500 mb-0.5"><span>{c.name}</span><span>{c.count}</span></div>
              <div className="h-2 bg-slate-100 rounded-full overflow-hidden">
                <div className="h-full bg-emerald-500 rounded-full" style={{ width: (c.count / maxUserCount * 100) + "%" }}></div>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div className="bg-white border border-slate-200 rounded-xl p-4 mt-4">
        <h3 className="text-sm font-semibold text-slate-600 mb-3">保養週期預警清單</h3>
        {overdue.concat(upcoming).length === 0 ? (
          <p className="text-sm text-slate-400">目前無逾期或即將到期設備</p>
        ) : (
          <ul className="space-y-2">
            {overdue.map((eq) => (
              <li key={eq.id} className="flex justify-between text-sm"><span>{eq.name}（{eq.floor} {eq.zone}）</span><Badge color="red">已逾期 {Math.abs(daysUntilDue(eq.lastMaintenance, eq.cycleDays))} 天</Badge></li>
            ))}
            {upcoming.map((eq) => (
              <li key={eq.id} className="flex justify-between text-sm"><span>{eq.name}（{eq.floor} {eq.zone}）</span><Badge color="amber">{daysUntilDue(eq.lastMaintenance, eq.cycleDays)} 天後到期</Badge></li>
            ))}
          </ul>
        )}
      </div>
    </div>
  );
}

function StatCard({ label, value, highlight }) {
  const colorMap = { red: "text-red-600", amber: "text-amber-600" };
  return (
    <div className="bg-white border border-slate-200 rounded-xl p-4">
      <div className="text-xs text-slate-500 mb-1">{label}</div>
      <div className={`text-2xl font-bold ${colorMap[highlight] || "text-slate-800"}`}>{value}</div>
    </div>
  );
}

// ===================== App Root =====================

function App() {
  const [user, setUser] = useState(null);
  const [tab, setTab] = useState("scan");
  const [categories, setCategories] = useState(INITIAL_CATEGORIES);
  const [equipment, setEquipment] = useState(INITIAL_EQUIPMENT);
  const [records, setRecords] = useState(INITIAL_RECORDS);
  // 讀取設備專屬 QR 碼深層連結參數（#eq=設備編號）
  const [scanEquipmentId, setScanEquipmentId] = useState(() => readEqParam());

  useEffect(() => {
    const stored = sessionStorage.getItem("emm_user");
    if (!stored) {
      // 掃描 QR 後若尚未登入，先記住目標設備，登入後導回
      const eq = readEqParam();
      if (eq) sessionStorage.setItem("emm_pending_scan", eq);
      window.location.href = "index.html";
      return;
    }
    setUser(JSON.parse(stored));
    // 登入後若有待處理的掃描目標，帶入掃描頁
    const pending = sessionStorage.getItem("emm_pending_scan");
    if (pending) {
      setScanEquipmentId(pending);
      sessionStorage.removeItem("emm_pending_scan");
    }
  }, []);

  if (!user) return null;

  const isAdmin = user.ROLE === "admin";
  const tabs = [
    { key: "scan", label: "QR掃描紀錄" },
    { key: "equipment", label: "設備管理" },
    ...(isAdmin ? [{ key: "category", label: "分類設定" }] : []),
    { key: "records", label: "紀錄查詢" },
    { key: "analytics", label: "數據分析" },
  ];

  function handleLogout() {
    sessionStorage.removeItem("emm_user");
    window.location.href = "index.html";
  }

  return (
    <div>
      <TopNav user={user} tabs={tabs} active={tab} onChange={setTab} onLogout={handleLogout} />
      <div className="py-4">
        {tab === "scan" && <ScanRecordView user={user} equipment={equipment} categories={categories} onSubmit={(r) => setRecords([r, ...records])} initialEquipmentId={scanEquipmentId} onConsumeInitial={() => setScanEquipmentId("")} />}
        {tab === "equipment" && <EquipmentView equipment={equipment} canEdit={isAdmin}
          onAdd={(eq) => setEquipment([...equipment, eq])}
          onUpdate={(id, changes) => setEquipment(equipment.map((eq) => (eq.id === id ? { ...eq, ...changes } : eq)))}
          onDelete={(id) => setEquipment(equipment.filter((eq) => eq.id !== id))}
        />}
        {tab === "category" && isAdmin && <CategoryConfigView categories={categories} onAdd={(c) => setCategories([...categories, c])} onRemove={(id) => setCategories(categories.filter((c) => c.id !== id && c.parent !== id))} />}
        {tab === "records" && <RecordsView user={user} records={records} equipment={equipment} categories={categories} />}
        {tab === "analytics" && <AnalyticsView records={records} equipment={equipment} categories={categories} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

  const source = document.getElementById("app-source").textContent;
  const output = Babel.transform(source, { presets: [["react", { runtime: "classic" }]] }).code;
  (0, eval)(output);
})();
</script>
</body>
